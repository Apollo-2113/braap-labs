<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MOTO AIR — Golden Hour</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Michroma&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');

:root {
  --bg:        #0a0900;
  --bg2:       #141008;
  --bg3:       #1c160a;
  --border:    #2e2408;
  --border2:   #504010;
  --chrome:    #c8960a;
  --chrome-dim:#7a5808;
  --chrome-hi: #f0c840;
  --white:     #f0e0a0;
  --white-dim: #907830;
  --red:       #e84820;
  --ice:       #f0a800;
  --ice-dim:   #805800;
  --green:     #a8c820;
  --needle:    #f0a800;
  --glass:     rgba(240,168,0,0.04);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Golden hour grain texture */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(240,180,20,0.022) 3px, rgba(240,180,20,0.022) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(240,180,20,0.012) 80px, rgba(240,180,20,0.012) 81px);
  pointer-events: none; z-index: 0;
}

/* Golden hour vignette */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(6,4,0,0.82) 100%);
  pointer-events: none; z-index: 0;
}

.shell {
  position: relative; z-index: 1;
  max-width: 420px;
  margin: 0 auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── HEADER PLATE ── */
.header-plate {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
  box-shadow:
    inset 0 1px 0 rgba(240,180,20,0.10),
    inset 0 -1px 0 rgba(0,0,0,0.5),
    0 2px 8px rgba(0,0,0,0.6);
}

/* Brushed titanium lines */
.header-plate::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    92deg,
    transparent,
    transparent 2px,
    rgba(240,180,20,0.03) 2px,
    rgba(240,180,20,0.03) 3px
  );
}

.logo {
  font-family: 'Michroma', sans-serif;
  font-size: 20px;
  letter-spacing: 0.2em;
  color: var(--chrome-hi);
  text-shadow: 0 0 20px rgba(240,168,0,0.38);
}
.logo span { color: var(--ice); }

.header-rivets {
  display: flex; gap: 6px; align-items: center;
}
.rivet {
  width: 8px; height: 8px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--chrome-hi), var(--chrome-dim));
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.6), 0 1px 0 rgba(240,180,20,0.14);
}

/* ── STATE BAR ── */
/* ── STATUS BAR ── */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 8px 14px;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
}
.sensor-badges {
  display: flex;
  gap: 8px;
  align-items: center;
}
.sensor-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--border2);
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: 2px;
  transition: all 0.3s;
}
.sensor-badge.active {
  color: var(--green);
  border-color: var(--green);
  background: rgba(168,200,32,0.06);
}
.sensor-badge.error {
  color: var(--red);
  border-color: var(--red);
}
.sensor-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
}
.sensor-dot.pulse { animation: dot-pulse 1s ease-in-out infinite; }
@keyframes dot-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.3; transform: scale(0.6); }
}
.best-airtime-display {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 1px;
}
.best-airtime-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  color: var(--chrome-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.best-airtime-value {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  color: var(--chrome-hi);
  line-height: 1;
  text-shadow: 0 0 10px rgba(240,168,0,0.4);
  white-space: nowrap;
}
.best-airtime-value.empty { color: var(--border2); }


/* ── GAUGE ROW ── */
.gauge-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.gauge-housing {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
  box-shadow:
    inset 0 2px 4px rgba(0,0,0,0.5),
    inset 0 -1px 0 rgba(240,180,20,0.05),
    0 1px 3px rgba(0,0,0,0.4);
}

/* Corner screws */
.gauge-housing::before,
.gauge-housing::after {
  content: '';
  position: absolute;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--chrome-hi), var(--chrome-dim));
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.6);
}
.gauge-housing::before { top: 5px; left: 5px; }
.gauge-housing::after  { top: 5px; right: 5px; }

.gauge-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--chrome-dim);
  text-align: center;
}

/* SVG GAUGE */
.gauge-svg-wrap {
  position: relative;
  width: 160px; height: 100px;
  overflow: visible;
}

/* ── BIG AIRTIME DISPLAY ── */
/* ── NIXIE ROW ── */
.nixie-row {
  display: flex;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  overflow: hidden;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.5);
  position: relative;
}
.nixie-panel {
  flex: 1;
  padding: 14px 16px;
  position: relative;
}
.nixie-divider {
  width: 1px;
  background: var(--border2);
  margin: 10px 0;
}
.nixie-sm {
  font-size: 40px !important;
}
.nixie-dist {
  color: var(--green) !important;
  text-shadow:
    0 0 8px rgba(168,200,32,0.85),
    0 0 20px rgba(168,200,32,0.45),
    0 0 40px rgba(168,200,32,0.22) !important;
}

.airtime-housing {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 16px 20px;
  position: relative;
  overflow: hidden;
  box-shadow:
    inset 0 2px 6px rgba(0,0,0,0.5),
    inset 0 -1px 0 rgba(240,180,20,0.05);
}

/* All four corner screws */
.airtime-housing .screw {
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--chrome-hi), var(--chrome-dim));
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.6);
}
.screw.tl { top:6px; left:6px; }
.screw.tr { top:6px; right:6px; }
.screw.bl { bottom:6px; left:6px; }
.screw.br { bottom:6px; right:6px; }

.airtime-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--chrome-dim);
  margin-bottom: 8px;
}

/* Nixie-tube-style digits */
.nixie {
  font-family: 'Share Tech Mono', monospace;
  font-size: 52px;
  line-height: 1;
  color: var(--ice);
  text-shadow:
    0 0 8px rgba(240,168,0,0.85),
    0 0 20px rgba(240,168,0,0.45),
    0 0 40px rgba(240,168,0,0.22);
  letter-spacing: 0.05em;
}
.nixie .unit {
  font-size: 18px;
  opacity: 0.6;
  vertical-align: bottom;
  margin-left: 2px;
}

.airtime-sub {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  color: var(--white-dim);
  margin-top: 4px;
  letter-spacing: 0.05em;
}

/* ── WAVEFORM / STRIP CHART ── */
.strip-housing {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.5);
}
.strip-header {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg3);
}
.strip-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--chrome-dim);
}
.strip-hz {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--border2);
}
canvas#analogWave {
  display: block;
  width: 100%;
  height: 90px;
  background: #080600;
}

/* ── JUMP LOG ── */
.log-housing {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  overflow: hidden;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
}
.log-header {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg3);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.log-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--chrome-dim);
}
.log-scroll {
  max-height: 240px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.log-entry {
  display: grid;
  grid-template-columns: 32px 1fr 1fr 1fr 1fr;
  padding: 10px 14px;
  border-bottom: 1px solid rgba(58,52,32,0.5);
  gap: 4px;
  align-items: center;
  transition: background 0.1s;
}
.log-entry:hover { background: var(--bg3); }
.log-entry.new-entry { animation: log-in 0.4s ease-out; }
@keyframes log-in {
  from { background: rgba(240,168,0,0.07); transform: translateX(-6px); opacity: 0; }
  to { background: transparent; transform: none; opacity: 1; }
}

.le-num {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--border2);
}
.le-stat { display: flex; flex-direction: column; gap: 1px; }
.le-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  color: var(--white);
}
.le-lbl {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  text-transform: uppercase;
  color: var(--border2);
  letter-spacing: 0.08em;
}
.le-delta {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
}
.delta-up   { color: var(--green); }
.delta-down { color: var(--red); }
.delta-same { color: var(--border2); }

.le-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--ice);
  text-align: right;
}
.is-best .le-num::before {
  content: '★';
  display: block;
  color: var(--chrome);
  font-size: 10px;
}

/* ── CONTROLS ── */
.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border-radius: 3px;
  cursor: pointer;
  padding: 11px 16px;
  transition: all 0.12s;
  position: relative;
  overflow: hidden;
  box-shadow:
    inset 0 1px 0 rgba(240,180,20,0.10),
    inset 0 -2px 0 rgba(0,0,0,0.4),
    0 2px 6px rgba(0,0,0,0.5);
}
.btn-start {
  background: linear-gradient(180deg, #0e1e2e 0%, #080e18 100%);
  border: 1px solid #604000;
  color: var(--green);
  text-shadow: 0 0 8px rgba(168,200,32,0.45);
}
.btn-start:hover {
  background: linear-gradient(180deg, #122840 0%, #0a1e30 100%);
  box-shadow: inset 0 1px 0 rgba(240,180,20,0.14), 0 0 12px rgba(240,168,0,0.22);
}
.btn-sim {
  background: linear-gradient(180deg, #0e1a24 0%, #080e16 100%);
  border: 1px solid var(--border2);
  color: var(--ice);
  text-shadow: 0 0 8px rgba(240,168,0,0.32);
}
.btn-sim:hover {
  background: linear-gradient(180deg, #102030 0%, #081018 100%);
}
.btn-stop {
  background: linear-gradient(180deg, #1a0810 0%, #0e0610 100%);
  border: 1px solid #602030;
  color: var(--red);
  opacity: 0.5;
}
.btn-stop:not([disabled]) { opacity: 1; }
.btn-clear {
  background: linear-gradient(180deg, #121820 0%, #0a0e14 100%);
  border: 1px solid var(--border);
  color: var(--white-dim);
}

/* ── DIGITAL SPEED DISPLAY ── */
.speed-digital {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin: 8px 0 4px;
}
.speed-number {
  font-family: 'Share Tech Mono', monospace;
  font-size: 52px;
  line-height: 1;
  color: var(--ice);
  text-shadow:
    0 0 8px rgba(240,168,0,0.8),
    0 0 20px rgba(240,168,0,0.4);
  letter-spacing: -0.02em;
  transition: color 0.2s;
  min-width: 3ch;
  text-align: right;
}
.speed-number.fast  { color: #e84820; text-shadow: 0 0 8px rgba(232,72,32,0.8), 0 0 20px rgba(232,72,32,0.4); }
.speed-number.mid   { color: var(--chrome-hi); }
.speed-unit {
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px;
  color: var(--chrome-dim);
  letter-spacing: 0.1em;
  padding-bottom: 6px;
}
.speed-bar-wrap {
  width: 100%;
  margin-top: 8px;
}
.speed-bar-track {
  width: 100%;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.speed-bar-fill {
  height: 100%;
  width: 0%;
  border-radius: 3px;
  background: linear-gradient(90deg, #a8c820, #f0a800, #e84820);
  transition: width 0.3s ease-out;
  box-shadow: 0 0 6px rgba(240,168,0,0.5);
}
.speed-bar-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 3px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  color: var(--border2);
}
.speed-status {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--border2);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 6px;
  text-align: center;
}

/* ── BIKE TYPE TOGGLE ── */
.bike-toggle-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.bike-toggle {
  display: flex;
  align-items: center;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 4px;
  gap: 4px;
  position: relative;
  width: 100%;
  max-width: 280px;
}
.bike-opt {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px;
  background: none;
  border: none;
  border-radius: 2px;
  cursor: pointer;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--border2);
  transition: color 0.2s;
  z-index: 1;
  position: relative;
}
.bike-opt.active { color: var(--bg); }
.bike-icon { font-size: 14px; }
.bike-slider {
  position: absolute;
  top: 4px; bottom: 4px;
  width: calc(50% - 4px);
  left: 4px;
  background: var(--chrome-hi);
  border-radius: 2px;
  transition: transform 0.25s cubic-bezier(0.34, 1.2, 0.64, 1);
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.bike-slider.gas { transform: translateX(calc(100% + 4px)); }
.bike-preset-info {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--chrome-dim);
  letter-spacing: 0.1em;
  text-align: center;
}

.btn-export {
  background: linear-gradient(180deg, #0e1a24 0%, #080e16 100%);
  border: 1px solid var(--border2);
  color: var(--chrome-hi);
  text-shadow: 0 0 8px rgba(240,200,64,0.3);
}
.btn-export:hover {
  background: linear-gradient(180deg, #162230 0%, #0c1420 100%);
  box-shadow: 0 0 12px rgba(240,200,64,0.15);
}
.btn-export:disabled { opacity: 0.3; cursor: not-allowed; }

.empty-log {
  padding: 32px;
  text-align: center;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--border2);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
</style>
</head>
<body>

<div class="shell">

  <!-- HEADER -->
  <div class="header-plate">
    <div class="logo">MOTO <span>AIR</span></div>
    <div class="header-rivets">
      <div class="rivet"></div>
      <div class="rivet"></div>
      <div class="rivet"></div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="sensor-badges">
      <div class="sensor-badge" id="accelBadge">
        <div class="sensor-dot" id="accelDot"></div>
        <span>ACCEL</span>
      </div>
      <div class="sensor-badge" id="gyroBadge">
        <div class="sensor-dot" id="gyroDot"></div>
        <span>GYRO</span>
      </div>
      <div class="sensor-badge" id="sessionBadge">
        <div class="sensor-dot" id="sessionDot"></div>
        <span id="sessionLabel">IDLE</span>
      </div>
      <div class="sensor-badge" id="gpsBadge">
        <div class="sensor-dot" id="gpsDot"></div>
        <span id="gpsLabel">GPS</span>
      </div>
    </div>
    <div class="best-airtime-display">
      <div class="best-airtime-label">🏆 Best</div>
      <div class="best-airtime-value empty" id="bestAirtimeVal">—</div>
    </div>
  </div>

  <!-- GAUGE ROW -->
  <div class="gauge-row">

    <!-- G-FORCE GAUGE -->
    <div class="gauge-housing">
      <div class="gauge-label">G-Force</div>
      <div class="gauge-svg-wrap">
        <svg viewBox="0 0 160 100" width="160" height="100">
          <defs>
            <radialGradient id="dialGrad" cx="50%" cy="100%" r="80%">
              <stop offset="0%" stop-color="#1c1600"/>
              <stop offset="100%" stop-color="#060400"/>
            </radialGradient>
            <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="2" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <!-- Dial background -->
          <path d="M 10 90 A 70 70 0 0 1 150 90" fill="url(#dialGrad)" stroke="#3a2e08" stroke-width="1.5"/>
          <!-- Outer bezel -->
          <path d="M 6 90 A 74 74 0 0 1 154 90" fill="none" stroke="#5a4010" stroke-width="2"/>
          <!-- Arc zones: green 0-1.5G, amber 1.5-3G, red 3-5G -->
          <path d="M 12 90 A 66 66 0 0 1 46 34" fill="none" stroke="#a8c820" stroke-width="5" stroke-linecap="butt" opacity="0.8"/>
          <path d="M 46 34 A 66 66 0 0 1 114 34" fill="none" stroke="#f0a800" stroke-width="5" stroke-linecap="butt" opacity="0.8"/>
          <path d="M 114 34 A 66 66 0 0 1 148 90" fill="none" stroke="#e84820" stroke-width="5" stroke-linecap="butt" opacity="0.8"/>
          <!-- Major ticks -->
          <g stroke="#c8a820" stroke-width="1.5">
            <line x1="80" y1="22" x2="80" y2="34" transform="rotate(-90 80 90)"/>
            <line x1="80" y1="22" x2="80" y2="34" transform="rotate(-54 80 90)"/>
            <line x1="80" y1="22" x2="80" y2="34" transform="rotate(-18 80 90)"/>
            <line x1="80" y1="22" x2="80" y2="34" transform="rotate(18 80 90)"/>
            <line x1="80" y1="22" x2="80" y2="34" transform="rotate(54 80 90)"/>
            <line x1="80" y1="22" x2="80" y2="34" transform="rotate(90 80 90)"/>
          </g>
          <!-- Minor ticks -->
          <g stroke="#7a5808" stroke-width="1">
            <line x1="80" y1="25" x2="80" y2="34" transform="rotate(-72 80 90)"/>

<script>
'use strict';

/* ── Signal Processor (same math as production) ── */
const SP = {
  mag: (x,y,z) => Math.sqrt(x*x+y*y+z*z),
  lpf: (s, last, a) => a*s + (1-a)*last,
  toG: v => v / 9.81,
};

/* ── State Machine ── */
class FSM {
  static S = { GROUND:'GROUND', AIR:'AIR', LAND:'LAND' };
  constructor(cfg, onJump, onState) {
    this.cfg = cfg;
    this.onJump = onJump; this.onState = onState;
    this._s = FSM.S.GROUND;
    this._t0 = null; this._peakG = 0; this._peakW = 0;
    this._fsSamples = 0; this._filtGyro = 0; this._count = 0;
  }
  update(mag, rawMag, gyro, ts) {
    // mag = LPF filtered (good for freefall — removes engine vibration)
    // rawMag = unfiltered (good for landing — preserves impact spike)
    this._filtGyro = SP.lpf(gyro, this._filtGyro, 0.2);
    switch(this._s) {
      case FSM.S.GROUND:
        // No gyro check — handlebar mount rotates heavily during jumps
        // Just need magnitude to drop below freefall threshold
        if (mag < this.cfg.ff) {
          if (++this._fsSamples >= 2) { this._to(FSM.S.AIR, ts); this._t0=ts; this._peakG=0; this._peakW=0; }
        } else this._fsSamples=0;
        break;
      case FSM.S.AIR:
        if (gyro > this._peakW) this._peakW = gyro;
        if (rawMag > this._peakG) this._peakG = rawMag;
        // Use RAW magnitude for landing — don't let LPF eat the spike
        if (rawMag > this.cfg.land) { this._to(FSM.S.LAND, ts); this._doLand(rawMag, ts); }
        break;
      case FSM.S.LAND:
        if (rawMag < 1.5) this._to(FSM.S.GROUND, ts);
        break;
    }
    return this._s;
  }
  _doLand(impG, ts) {
    const ms = ts - this._t0;
    if (ms < this.cfg.minMs) return;
    this._count++;
    this.onJump(Object.freeze({ id:this._count, timestamp:new Date(), airtimeMs:Math.round(ms), impactG:parseFloat(impG.toFixed(2)), peakW:Math.round(this._peakW) }));
  }
  _to(s, ts) { const p=this._s; this._s=s; if(p!==s) this.onState(s,p); }
  get state() { return this._s; }
}

/* ── Waveform Renderer ── */
class Wave {
  constructor(el) {
    this._c = el; this._ctx = el.getContext('2d');
    this._buf = new Float32Array(300); this._h = 0;
    this._ff = 0.80; this._land = 1.5; this._dirty = false;
    new ResizeObserver(()=>this._resize()).observe(el.parentElement);
    this._resize(); requestAnimationFrame(()=>this._loop());
  }
  push(v) { this._buf[this._h++ % this._buf.length]=v; this._dirty=true; }
  _resize() {
    const dpr=window.devicePixelRatio||1, p=this._c.parentElement;
    this._c.width=p.clientWidth*dpr; this._c.height=90*dpr;
    this._c.style.width=p.clientWidth+'px'; this._c.style.height='90px';
    this._dirty=true;
  }
  _loop() { if(this._dirty){this._draw();this._dirty=false;} requestAnimationFrame(()=>this._loop()); }
  _draw() {
    const ctx=this._ctx, W=this._c.width, H=this._c.height, dpr=window.devicePixelRatio||1;
    const PAD=6*dpr, DH=H-PAD*2;
    ctx.clearRect(0,0,W,H);
    // Dark warm background with subtle grid
    ctx.fillStyle='#0c0b06'; ctx.fillRect(0,0,W,H);
    // Horizontal graph lines (ice, very dim)
    ctx.strokeStyle='rgba(46,61,80,0.4)'; ctx.lineWidth=1;
    for(let i=1;i<4;i++){const y=PAD+DH/4*i;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    const N=this._buf.length, len=Math.min(this._h,N), yMax=Math.max(4,this._land*1.4);
    const ys=DH/yMax;
    // Threshold lines — etched look
    const ffy=PAD+DH-this._ff*ys, ldy=PAD+DH-this._land*ys;
    ctx.strokeStyle='rgba(96,200,64,0.35)'; ctx.setLineDash([3*dpr,5*dpr]); ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,ffy);ctx.lineTo(W,ffy);ctx.stroke();
    ctx.strokeStyle='rgba(232,64,48,0.4)'; ctx.setLineDash([3*dpr,3*dpr]);
    ctx.beginPath();ctx.moveTo(0,ldy);ctx.lineTo(W,ldy);ctx.stroke();
    ctx.setLineDash([]);
    if(len<2) return;
    // Cold titanium trace — precision instrument
    ctx.shadowColor='rgba(240,168,0,0.55)'; ctx.shadowBlur=4*dpr;
    ctx.strokeStyle='#e09000'; ctx.lineWidth=1.2*dpr; ctx.lineJoin='round';
    ctx.beginPath();
    for(let i=0;i<len;i++){
      const bi=(this._h-len+i)%N, v=this._buf[(bi+N)%N];
      const x=(i/(N-1))*W, y=PAD+DH-Math.min(v*ys,DH);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke(); ctx.shadowBlur=0;
    // Labels
    ctx.fillStyle='rgba(168,200,32,0.55)'; ctx.font=`${8*dpr}px Share Tech Mono`;
    ctx.fillText(`${this._ff}G`,4*dpr,ffy-3*dpr);
    ctx.fillStyle='rgba(232,64,48,0.55)';
    ctx.fillText(`${this._land}G`,4*dpr,ldy-3*dpr);
  }
}

/* ── Simulator ── */
class Sim {
  constructor(cb, onSpeed) {
    this._cb      = cb;
    this._onSpeed = onSpeed; // callback(mph) to update speedometer
    this._id      = null;
    this._ph      = 'ride';
    this._pht     = 0;
    this._nextT   = this._rideT();
    this._simSpeedMph = 30 + Math.random() * 15; // 30–45 mph approach
  }

  // Realistic MX timing
  _rideT()   { return 1500 + Math.random() * 1500; } // 1.5–3s between jumps
  _airT()    { return 350  + Math.random() * 650;  } // 0.35–1.0s airtime (realistic MX)
  _settleT() { return 600  + Math.random() * 400;  } // 0.6–1s settle

  start() {
    let last = performance.now();
    const t = () => {
      const now = performance.now();
      const dt  = now - last; last = now;
      this._pht += dt;
      this._cb(this._frame(now));
      this._id = requestAnimationFrame(t);
    };
    this._id = requestAnimationFrame(t);
  }

  stop() {
    if (this._id) cancelAnimationFrame(this._id);
    this._id = null; this._ph = 'ride'; this._pht = 0; this._nextT = this._rideT();
  }

  _frame(now) {
    const G   = 9.81;
    // Engine vibration noise — 450F ~50Hz harmonic
    const eng = () => (Math.random() - 0.5) * 1.8 * G;
    const trk = () => (Math.random() - 0.5) * 0.6 * G;

    let ax, ay, az, gx, gy, gz;

    switch (this._ph) {

      case 'ride':
        // Normal riding: ~1G total, engine + track vibration
        ax = G + eng() * 0.35 + trk();
        ay = eng() * 0.2; az = eng() * 0.2;
        gx = (Math.random()-0.5)*50; gy=(Math.random()-0.5)*35; gz=(Math.random()-0.5)*35;
        // Vary sim speed realistically during riding
        this._simSpeedMph = Math.max(20, Math.min(50,
          this._simSpeedMph + (Math.random()-0.5)*3));
        this._onSpeed(this._simSpeedMph);
        if (this._pht > this._nextT) this._next('takeoff');
        break;

      case 'takeoff':
        // Compression then launch: ~150ms, mag drops sharply
        { const r = Math.min(1, this._pht / 150);
          ax = Math.max(0.12, (1.0 - r * 5.0)) * G + eng() * 0.08;
          ay = eng() * 0.04; az = eng() * 0.04;
          gx=(Math.random()-0.5)*60; gy=(Math.random()-0.5)*50; gz=(Math.random()-0.5)*50;
          if (this._pht > 150) this._next('air');
        } break;

      case 'air':
        // Freefall: 0.1–0.25G total, smooth gyro whip mid-flight
        { const ap  = this._pht / this._nextT;
          const whip = Math.sin(ap * Math.PI) * 2.5; // peaks mid-air
          ax = (0.12 + (Math.random()-0.5)*0.08) * G;
          ay = (Math.random()-0.5)*0.06*G;
          az = (Math.random()-0.5)*0.06*G;
          gx = whip*90 + (Math.random()-0.5)*15;
          gy = whip*60 + (Math.random()-0.5)*12;
          gz = whip*40 + (Math.random()-0.5)*10;
          if (this._pht > this._nextT) this._next('impact');
        } break;

      case 'impact':
        // Sharp landing spike: 3–6G, decays over ~100ms
        { const r   = Math.max(0, 1 - this._pht / 100);
          const mag = (3.0 + Math.random() * 3.0) * G;
          ax = mag * r;
          ay = (Math.random()-0.5)*mag*0.3*r;
          az = (Math.random()-0.5)*mag*0.3*r;
          gx=(Math.random()-0.5)*180*r; gy=(Math.random()-0.5)*120*r; gz=(Math.random()-0.5)*80*r;
          if (this._pht > 120) this._next('settle');
        } break;

      case 'settle':
        // Riding out landing, speed drops slightly
        this._simSpeedMph = Math.max(15, this._simSpeedMph - 2);
        this._onSpeed(this._simSpeedMph);
        ax = G*0.95 + eng()*0.25; ay=eng()*0.15; az=eng()*0.15;
        gx=(Math.random()-0.5)*45; gy=(Math.random()-0.5)*35; gz=(Math.random()-0.5)*35;
        if (this._pht > this._settleT()) this._next('ride');
        break;
    }

    return { ax, ay, az, gx, gy, gz, timestamp: now, hz: 60 };
  }

  _next(ph) {
    this._ph = ph; this._pht = 0;
    if (ph === 'ride')  { this._nextT = this._rideT(); this._simSpeedMph = 28 + Math.random()*15; }
    if (ph === 'air')   this._nextT = this._airT();
  }
}

/* ── Needle animation ── */
// SVG native transform — pivot at (80,90) matches needle geometry
// Needle helper — SVG native transform, pivot at (80,90)
function setNeedle(id, angleDeg) {
  document.getElementById(id).setAttribute('transform', `rotate(${angleDeg} 80 90)`);
}
// G gauge:      -90deg = 0G,  +90deg = 5G
function gToAngle(g) { return Math.min(90, Math.max(-90, (g / 5) * 180 - 90)); }
// Impact gauge: -90deg = 0G,  +90deg = 6G — kept for log display
function iToAngle(g) { return Math.min(90, Math.max(-90, (g / 6) * 180 - 90)); }
// Speedometer: -90deg = 0mph, +90deg = 80mph
function sToAngle(mph) { return Math.min(90, Math.max(-90, (mph / 80) * 180 - 90)); }

// Distance gauge: -90deg = 0ft, +90deg = 100ft

/* ── GPS Speed Tracker ── */
/* ── Haversine distance formula ──
   Returns distance in feet between two GPS coordinates.
   Accurate for short distances (< 1 mile).
*/
function haversineDistFt(lat1, lon1, lat2, lon2) {
  const R    = 20902231; // Earth radius in feet
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a    = Math.sin(dLat/2) * Math.sin(dLat/2)
             + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180)
             * Math.sin(dLon/2) * Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

class GpsTracker {
  constructor(onStatus) {
    this._speed    = null;   // current speed mph
    this._coords   = null;   // { lat, lon } latest position
    this._watchId  = null;
    this._onStatus = onStatus;
  }

  start() {
    if (!navigator.geolocation) { this._onStatus('unavailable'); return; }
    this._onStatus('acquiring');
    this._watchId = navigator.geolocation.watchPosition(
      pos => {
        this._coords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
        this._speed  = (pos.coords.speed !== null && pos.coords.speed >= 0)
                       ? pos.coords.speed * 2.23694 : 0;
        this._onStatus('locked');
      },
      err => { this._onStatus(err.code === 1 ? 'denied' : 'unavailable'); },
      { enableHighAccuracy: true, maximumAge: 500, timeout: 10000 }
    );
  }

  stop() {
    if (this._watchId !== null) navigator.geolocation.clearWatch(this._watchId);
    this._watchId = null; this._speed = null; this._coords = null;
    this._onStatus('idle');
  }

  // Snapshot full state at takeoff/landing
  snapshotState() {
    return { speed: this._speed, coords: this._coords ? {...this._coords} : null };
  }

  // Legacy speed-only snapshot
  snapshot() { return this._speed; }
}


/* ── App ── */
class App {
  constructor() {
    this._filtMag = 1; this._jumps = []; this._sampleCount = 0;
    this._lastHz = 0; this._lastHzTime = performance.now();
    this._airtimeRaf = null;

    this._wave = new Wave(document.getElementById('analogWave'));
    this._fsm  = new FSM(
      { ff:0.80, land:1.5, minMs:150 },
      e => this._onJump(e),
      s => this._onState(s)
    );
    this._session = null; this._sim = null;
    this._gps = new GpsTracker(status => this._updateGpsBadge(status));
    this._takeoffGpsState  = null;
    this._takeoffSpeedMph  = null;
    this._lastDistFt       = 0;
    this._arcFactor        = 0.50; // distance correction — tuned per bike type

    document.getElementById('btnEnable').addEventListener('click', () => this._startReal());
    document.getElementById('btnSim').addEventListener('click',    () => this._startSim());
    document.getElementById('btnStop').addEventListener('click',   () => this._stop());
    document.getElementById('btnClear').addEventListener('click',  () => this._clear());
    document.getElementById('btnExport').addEventListener('click', () => this._exportSession());

    this._lastUi = 0;

    // Apply default bike preset last — after all state is initialized
    this._bikeType = 'electric';
    this.setBikeType('electric');
  }

  _frame(f) {
    const rawMag = SP.toG(SP.mag(f.ax, f.ay, f.az));
    this._filtMag = SP.lpf(rawMag, this._filtMag, 0.25);
    const gyroMag = SP.mag(f.gx, f.gy, f.gz);

    this._sampleCount++;
    const now = performance.now();
    if (now - this._lastHzTime > 1000) {
      this._lastHz = this._sampleCount; this._sampleCount = 0; this._lastHzTime = now;
    }

    this._fsm.update(this._filtMag, rawMag, gyroMag, f.timestamp);
    this._wave.push(this._filtMag);

    if (now - this._lastUi > 40) {
      this._lastUi = now;
      // Update G needle
      setNeedle('gNeedle', gToAngle(this._filtMag));
      document.getElementById('gText').textContent = this._filtMag.toFixed(2)+'G';

      // Digital speedometer — live GPS
      const spd = this._gps.snapshot();
      if (spd !== null) {
        const spdR = Math.round(spd);
        const sEl  = document.getElementById('sText');
        sEl.textContent = spdR;
        sEl.className   = 'speed-number' + (spd >= 50 ? ' fast' : spd >= 25 ? ' mid' : '');
        document.getElementById('sBar').style.width = Math.min(100,(spd/80)*100)+'%';
        document.getElementById('sStatus').textContent = spd > 1 ? 'GPS LIVE' : 'STOPPED';
      }

      // Distance nixie — live estimate while airborne
      const tState = this._takeoffGpsState;
      if (this._fsm.state === FSM.S.AIR && this._fsm._t0 && tState && tState.speed !== null) {
        const elapsedS = (performance.now() - this._fsm._t0) / 1000;
        const speedFps = tState.speed * 1.46667;
        const estFt    = Math.round(speedFps * elapsedS * this._arcFactor);
        this._lastDistFt = estFt;
        document.getElementById('nixieDist').innerHTML = estFt + '<span class="unit">ft</span>';
        document.getElementById('distSub').textContent = 'IN FLIGHT';
      } else if (this._fsm.state === FSM.S.AIR && this._fsm._t0 && (!tState || tState.speed === null)) {
        // Airborne but no GPS — show airtime-based running estimate
        const elapsedS = (performance.now() - this._fsm._t0) / 1000;
        const estFt    = Math.round(25 * 1.46667 * elapsedS * this._arcFactor);
        document.getElementById('nixieDist').innerHTML = '~' + estFt + '<span class="unit">ft</span>';
        document.getElementById('distSub').textContent = 'IN FLIGHT';
      } else if (this._fsm.state !== FSM.S.AIR && !this._jumps.length) {
        document.getElementById('distSub').textContent = 'GPS NEEDED';
      }
      document.getElementById('stripHz').textContent = this._lastHz + ' Hz';

      if (this._fsm.state === FSM.S.AIR && this._fsm._t0) {
        const el = (performance.now() - this._fsm._t0) / 1000;
        document.getElementById('nixieTime').innerHTML = el.toFixed(3) + '<span class="unit">s</span>';
      }
    }
  }

  _onState(s) {
    if (s === FSM.S.AIR) {
      this._takeoffGpsState = this._gps.snapshotState();
      this._takeoffSpeedMph = this._takeoffGpsState.speed;
    }
    if (s === FSM.S.LAND) this._flashImpact();
  }

  _flashImpact() {
    // Brief red screen flash on landing — subtle
    document.body.style.transition = 'background 0.05s';
    document.body.style.background = 'rgba(232,72,32,0.12)';
    setTimeout(() => { document.body.style.background = ''; }, 120);
  }

  _setSessionActive(on) {
    const badges = ['accel','gyro','session'];
    badges.forEach(name => {
      const badge = document.getElementById(name+'Badge');
      const dot   = document.getElementById(name+'Dot');
      if (on) {
        badge.classList.add('active');
        dot.classList.add('pulse');
      } else {
        badge.classList.remove('active');
        dot.classList.remove('pulse');
      }
    });
    document.getElementById('sessionLabel').textContent = on ? 'LIVE' : 'IDLE';
    document.getElementById('btnStop').disabled   = !on;
    document.getElementById('btnEnable').disabled =  on;
    document.getElementById('btnSim').disabled    =  on;
  }

  _exportSession() {
    if (!this._jumps.length) {
      alert('No jumps to export yet.');
      return;
    }

    const payload = {
      exportedAt:    new Date().toISOString(),
      bikeType:      this._bikeType,
      settings: {
        freefallThresholdG: this._fsm.cfg.ff,
        landingThresholdG:  this._fsm.cfg.land,
        minAirtimeMs:       this._fsm.cfg.minMs,
        arcFactor:          this._arcFactor,
        lpfAlpha:           0.25,
      },
      sessionSummary: {
        totalJumps:       this._jumps.length,
        bestAirtimeSec:   Math.max(...this._jumps.map(j => j.airtimeMs)) / 1000,
        bestDistanceFt:   Math.max(...this._jumps.filter(j => j.distanceFt).map(j => j.distanceFt)),
        avgAirtimeSec:    (this._jumps.reduce((a,j) => a + j.airtimeMs, 0) / this._jumps.length / 1000).toFixed(3),
        avgImpactG:       (this._jumps.reduce((a,j) => a + j.impactG, 0) / this._jumps.length).toFixed(2),
      },
      jumps: [...this._jumps].reverse().map(j => ({
        id:              j.id,
        timestamp:       j.timestamp.toISOString(),
        airtimeSec:      (j.airtimeMs / 1000).toFixed(3),
        airtimeMs:       j.airtimeMs,
        impactG:         j.impactG,
        distanceFt:      j.distanceFt,
        distanceMethod:  j.distLabel || 'unknown',
        peakRotationDps: j.peakW,
      })),
    };

    const json     = JSON.stringify(payload, null, 2);
    const blob     = new Blob([json], { type: 'application/json' });
    const url      = URL.createObjectURL(blob);
    const a        = document.createElement('a');
    const filename = `motoair-session-${new Date().toISOString().slice(0,19).replace(/[:.]/g,'-')}.json`;
    a.href         = url;
    a.download     = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
    this._bikeType = type;

    const presets = {
      electric: { ff: 0.80, land: 1.5, minMs: 150, arcFactor: 0.65,
        label: '⚡ ELECTRIC — ff:0.80G · land:1.5G · min:150ms' },
      gas:      { ff: 0.25, land: 2.0, minMs: 250, arcFactor: 0.85,
        label: '🔥 GAS — ff:0.25G · land:2.0G · min:250ms' },
    };

    const p = presets[type];
    this._fsm.cfg.ff    = p.ff;
    this._fsm.cfg.land  = p.land;
    this._fsm.cfg.minMs = p.minMs;
    this._arcFactor     = p.arcFactor;
    this._wave._ff      = p.ff;
    this._wave._land    = p.land;
    this._wave._dirty   = true;

    // Update toggle UI
    const slider  = document.getElementById('bikeSlider');
    const elecBtn = document.getElementById('bikeElec');
    const gasBtn  = document.getElementById('bikeGas');
    const info    = document.getElementById('bikePresetInfo');

    slider.className  = type === 'gas' ? 'bike-slider gas' : 'bike-slider';
    elecBtn.classList.toggle('active', type === 'electric');
    gasBtn.classList.toggle('active',  type === 'gas');
    info.textContent  = p.label;
  }

  _updateGpsBadge(status) {
    const badge = document.getElementById('gpsBadge');
    const dot   = document.getElementById('gpsDot');
    const label = document.getElementById('gpsLabel');
    badge.className = 'sensor-badge';
    dot.classList.remove('pulse');
    switch(status) {
      case 'acquiring':
        label.textContent = 'GPS…';
        dot.classList.add('pulse');
        break;
      case 'locked':
        badge.classList.add('active');
        dot.classList.add('pulse');
        label.textContent = 'GPS';
        break;
      case 'denied':
        badge.classList.add('error');
        label.textContent = 'GPS ✗';
        break;
      case 'unavailable':
        label.textContent = 'NO GPS';
        break;
      case 'idle':
      default:
        label.textContent = 'GPS';
        break;
    }
  }

  _updateBestAirtime() {
    if (!this._jumps.length) return;
    const bestJump = this._jumps.reduce((a, b) => a.airtimeMs > b.airtimeMs ? a : b);
    const el = document.getElementById('bestAirtimeVal');
    const distStr = bestJump.distanceFt !== null ? ` · ${bestJump.distanceFt}ft` : '';
    el.textContent = (bestJump.airtimeMs / 1000).toFixed(3) + 's' + distStr;
    el.classList.remove('empty');
  }

  _onJump(e) {
    // ── Distance calculation — best available method
    let distFt   = null;
    let distLabel = 'LAST JUMP';

    const landingState = this._gps.snapshotState();
    const t = this._takeoffGpsState;

    if (t && t.coords && landingState.coords) {
      const haversine = haversineDistFt(
        t.coords.lat, t.coords.lon,
        landingState.coords.lat, landingState.coords.lon
      );
      if (haversine > 2) {
        // GPS moved — use true position distance
        distFt    = Math.round(haversine);
        distLabel = 'GPS DIST';
      } else if (t.speed !== null) {
        // GPS didn't update (< 1Hz) — fall back to speed × airtime
        const speedFps = t.speed * 1.46667;
        distFt    = Math.round(speedFps * (e.airtimeMs / 1000) * this._arcFactor);
        distLabel = 'EST DIST';
      }
    } else if (t && t.speed !== null) {
      // Have speed but no coords
      const speedFps = t.speed * 1.46667;
      distFt    = Math.round(speedFps * (e.airtimeMs / 1000) * this._arcFactor);
      distLabel = 'EST DIST';
    } else {
      // No GPS at all — airtime-based estimate
      // Assumes ~25mph approach speed typical for MX
      const speedFps = 25 * 1.46667;
      distFt    = Math.round(speedFps * (e.airtimeMs / 1000) * this._arcFactor);
      distLabel = '~ EST';
    }

    this._lastDistFt = distFt;
    document.getElementById('nixieDist').innerHTML = distFt + '<span class="unit">ft</span>';
    document.getElementById('distSub').textContent = distLabel;

    const eventWithDist = Object.freeze({ ...e, distanceFt: distFt, distLabel });
    this._jumps.unshift(eventWithDist);
    document.getElementById('nixieTime').innerHTML = (e.airtimeMs/1000).toFixed(3)+'<span class="unit">s</span>';
    document.getElementById('jumpCountSub').textContent = `SESSION — ${e.id} JUMP${e.id!==1?'S':''}`;
    document.getElementById('logCount').textContent = e.id + ' JUMP' + (e.id!==1?'S':'');
    this._updateBestAirtime();
    this._renderLog();
  }

  _renderLog() {
    const container = document.getElementById('logEntries');
    document.getElementById('emptyLog').style.display = 'none';
    container.innerHTML = '';
    const bestMs = Math.max(...this._jumps.map(j=>j.airtimeMs));

    this._jumps.forEach((e, i) => {
      const prev = this._jumps[i+1] || null;
      const d = (curr, pv, hiGood=true) => {
        if (!prev) return '<span class="delta-same">—</span>';
        const diff = curr - pv;
        if (Math.abs(diff) < 0.001) return '<span class="delta-same">=</span>';
        const good = hiGood ? diff>0 : diff<0;
        const cls  = good ? 'delta-up' : 'delta-down';
        const pct  = Math.abs((diff/pv*100)).toFixed(0);
        return `<span class="${cls}">${diff>0?'▲':'▼'}${pct}%</span>`;
      };

      const el = document.createElement('div');
      el.className = 'log-entry new-entry' + (e.airtimeMs===bestMs&&this._jumps.length>1?' is-best':'');
      el.innerHTML = `
        <div class="le-num">#${e.id}</div>
        <div class="le-stat">
          <div class="le-val" style="color:var(--ice)"}>${(e.airtimeMs/1000).toFixed(3)}s</div>
          <div class="le-lbl">airtime</div>
          <div class="le-delta">${d(e.airtimeMs, prev?.airtimeMs, true)}</div>
        </div>
        <div class="le-stat">
          <div class="le-val" style="color:var(--green)">${e.distanceFt !== null ? e.distanceFt+'ft' : '--'}</div>
          <div class="le-lbl">distance</div>
          <div class="le-delta">${e.distanceFt !== null ? d(e.distanceFt, prev?.distanceFt, true) : ''}</div>
        </div>
        <div class="le-stat">
          <div class="le-val" style="color:var(--red)">${e.impactG.toFixed(1)}G</div>
          <div class="le-lbl">impact</div>
          <div class="le-delta">${d(e.impactG, prev?.impactG, false)}</div>
        </div>
        <div class="le-badge">${e.airtimeMs===bestMs&&this._jumps.length>1?'★ BEST':''}</div>
      `;
      container.appendChild(el);
    });
  }

  async _startReal() {
    try {
      if (typeof DeviceMotionEvent.requestPermission === 'function') {
        if (await DeviceMotionEvent.requestPermission() !== 'granted') throw new Error('denied');
      }
      this._motionCb = evt => {
        const a = evt.accelerationIncludingGravity||evt.acceleration, r=evt.rotationRate;
        if(!a||a.x===null) return;
        this._frame({ax:a.x??0,ay:a.y??0,az:a.z??0,gx:r?.alpha??0,gy:r?.beta??0,gz:r?.gamma??0,timestamp:performance.now()});
      };
      window.addEventListener('devicemotion', this._motionCb, {passive:true});
      this._gps.start();
      this._setSessionActive(true);
    } catch(e) { alert('Sensor error: '+e.message); }
  }

  _startSim() {
    this._sim = new Sim(
      f => this._frame(f),
      mph => {
        // Sim drives digital speedometer
        this._takeoffSpeedMph = mph;
        const mphR = Math.round(mph);
        const simEl = document.getElementById('sText');
        simEl.textContent = mphR;
        simEl.className   = 'speed-number' + (mph >= 50 ? ' fast' : mph >= 25 ? ' mid' : '');
        document.getElementById('sBar').style.width = Math.min(100,(mph/80)*100)+'%';
        document.getElementById('sStatus').textContent = 'SIM';
      }
    );
    this._sim.start();
    this._setSessionActive(true);
  }

  _stop() {
    if (this._motionCb) { window.removeEventListener('devicemotion',this._motionCb); this._motionCb=null; }
    if (this._sim) { this._sim.stop(); this._sim=null; }
    this._gps.stop();
    this._takeoffSpeedMph = null;
    this._takeoffGpsState = null;
    this._setSessionActive(false);
  }

  _clear() {
    this._jumps = []; this._fsm._count = 0;
    document.getElementById('logEntries').innerHTML = '';
    document.getElementById('emptyLog').style.display = '';
    document.getElementById('nixieTime').innerHTML = '0.000<span class="unit">s</span>';
    document.getElementById('jumpCountSub').textContent = 'SESSION — 0 JUMPS';
    this._takeoffGpsState = null;
    this._takeoffSpeedMph = null;
    this._lastDistFt = 0;
    document.getElementById('nixieDist').innerHTML = '--<span class="unit">ft</span>';
    document.getElementById('distSub').textContent = 'GPS NEEDED';
    document.getElementById('sText').textContent = '--';
    document.getElementById('sText').className = 'speed-number';
    document.getElementById('sBar').style.width = '0%';
    document.getElementById('sStatus').textContent = 'NO GPS';
    const best = document.getElementById('bestAirtimeVal');
    best.textContent = '—'; best.classList.add('empty');
  }
}

window.addEventListener('DOMContentLoaded', () => { window._app = new App(); });
</script>
