<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BRAAP LABS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Michroma&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');

:root {
  --bg:        #0a0900;
  --bg2:       #141008;
  --bg3:       #1c160a;
  --border:    #2e2408;
  --border2:   #504010;
  --chrome:    #c8960a;
  --chrome-dim:#7a5808;
  --chrome-hi: #f0c840;
  --white:     #f0e0a0;
  --white-dim: #907830;
  --red:       #e84820;
  --ice:       #f0a800;
  --ice-dim:   #805800;
  --green:     #a8c820;
  --needle:    #f0a800;
  --glass:     rgba(240,168,0,0.04);
}

/* ── STAR WARS THEME ── */
body.sw {
  --bg:        #000a0f;
  --bg2:       #001520;
  --bg3:       #001d2a;
  --border:    #003048;
  --border2:   #005070;
  --chrome:    #00b4d8;
  --chrome-dim:#005a78;
  --chrome-hi: #90e0ef;
  --white:     #caf0f8;
  --white-dim: #4a90a0;
  --red:       #ff3030;
  --ice:       #00d4ff;
  --ice-dim:   #005888;
  --green:     #00ff88;
  --needle:    #00d4ff;
  --glass:     rgba(0,212,255,0.04);
}

/* SW texture — targeting grid */
body.sw::before {
  background:
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,180,255,0.025) 3px, rgba(0,180,255,0.025) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(0,180,255,0.015) 60px, rgba(0,180,255,0.015) 61px) !important;
}

/* SW nixie glow — blue instead of amber */
body.sw .nixie {
  color: #00d4ff !important;
  text-shadow:
    0 0 6px rgba(0,212,255,0.9),
    0 0 18px rgba(0,212,255,0.5),
    0 0 35px rgba(0,212,255,0.25),
    1px 1px 0 rgba(0,0,0,0.6) !important;
}
body.sw .nixie-dist {
  color: #00ff88 !important;
  text-shadow:
    0 0 8px rgba(0,255,136,0.85),
    0 0 20px rgba(0,255,136,0.4) !important;
}
body.sw .speed-number { color: #00d4ff !important; }
body.sw .speed-number.fast { color: #ff3030 !important; }
body.sw .speed-number.mid  { color: #90e0ef !important; }
body.sw .speed-bar-fill {
  background: linear-gradient(90deg, #00ff88, #00d4ff, #ff3030) !important;
  box-shadow: 0 0 6px rgba(0,212,255,0.6) !important;
}

/* SW canvas backgrounds */
body.sw canvas#analogWave { background: #000a0f !important; }

/* SW logo */
body.sw .logo { color: #90e0ef !important; text-shadow: 0 0 20px rgba(0,212,255,0.4) !important; }
body.sw .logo span { color: #00d4ff !important; }

/* SW bike toggle slider */
body.sw .bike-slider { background: #00d4ff !important; }
body.sw .bike-opt.active { color: #000 !important; }

/* SW buttons */
body.sw .btn-start { background: linear-gradient(180deg, #001a10 0%, #000e08 100%) !important; border-color: #00ff88 !important; color: #00ff88 !important; }
body.sw .btn-sim   { background: linear-gradient(180deg, #001520 0%, #000a0f 100%) !important; border-color: #005070 !important; color: #00d4ff !important; }
body.sw .btn-export { border-color: #005070 !important; color: #90e0ef !important; }

/* SW theme toggle button */
.theme-toggle {
  position: fixed;
  top: 10px; right: 10px;
  z-index: 500;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 5px 12px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--chrome-hi);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.theme-toggle:hover { border-color: var(--chrome); }


*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Golden hour grain texture */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(240,180,20,0.022) 3px, rgba(240,180,20,0.022) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(240,180,20,0.012) 80px, rgba(240,180,20,0.012) 81px);
  pointer-events: none; z-index: 0;
}

/* Golden hour vignette */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(6,4,0,0.82) 100%);
  pointer-events: none; z-index: 0;
}

.shell {
  position: relative; z-index: 1;
  max-width: 420px;
  margin: 0 auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── HEADER PLATE ── */
.header-plate {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
  box-shadow:
    inset 0 1px 0 rgba(240,180,20,0.10),
    inset 0 -1px 0 rgba(0,0,0,0.5),
    0 2px 8px rgba(0,0,0,0.6);
}

/* Brushed titanium lines */
.header-plate::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    92deg,
    transparent,
    transparent 2px,
    rgba(240,180,20,0.03) 2px,
    rgba(240,180,20,0.03) 3px
  );
}

.logo {
  font-family: 'Michroma', sans-serif;
  font-size: 20px;
  letter-spacing: 0.2em;
  color: var(--chrome-hi);
  text-shadow: 0 0 20px rgba(240,168,0,0.38);
}
.logo span { color: var(--ice); }

.header-rivets {
  display: flex; gap: 6px; align-items: center;
}
.rivet {
  width: 8px; height: 8px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--chrome-hi), var(--chrome-dim));
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.6), 0 1px 0 rgba(240,180,20,0.14);
}

/* ── STATE BAR ── */
/* ── STATUS BAR ── */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 8px 14px;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
}
.sensor-badges {
  display: flex;
  gap: 8px;
  align-items: center;
}
.sensor-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--border2);
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: 2px;
  transition: all 0.3s;
}
.sensor-badge.active {
  color: var(--green);
  border-color: var(--green);
  background: rgba(168,200,32,0.06);
}
.sensor-badge.error {
  color: var(--red);
  border-color: var(--red);
}
.sensor-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
}
.sensor-dot.pulse { animation: dot-pulse 1s ease-in-out infinite; }
@keyframes dot-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.3; transform: scale(0.6); }
}
.best-airtime-display {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 1px;
}
.best-airtime-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  color: var(--chrome-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.best-airtime-value {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  color: var(--chrome-hi);
  line-height: 1;
  text-shadow: 0 0 10px rgba(240,168,0,0.4);
  white-space: nowrap;
}
.best-airtime-value.empty { color: var(--border2); }


/* ── GAUGE ROW ── */
.gauge-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.gauge-housing {
  background:
    linear-gradient(160deg, rgba(255,220,100,0.04) 0%, transparent 40%),
    var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 14px 12px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
  box-shadow:
    inset 0 1px 0 rgba(255,220,100,0.08),
    inset 0 -2px 6px rgba(0,0,0,0.6),
    inset 2px 0 4px rgba(0,0,0,0.3),
    inset -2px 0 4px rgba(0,0,0,0.3),
    0 2px 8px rgba(0,0,0,0.6),
    0 0 0 1px rgba(0,0,0,0.4);
}

/* Corner accent lines — like the reference UI */
.gauge-housing::before,
.gauge-housing::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  border-color: var(--chrome-dim);
  border-style: solid;
  border-width: 0;
  opacity: 0.7;
}
.gauge-housing::before {
  top: 6px; left: 6px;
  border-top-width: 1.5px;
  border-left-width: 1.5px;
  border-radius: 2px 0 0 0;
}
.gauge-housing::after {
  top: 6px; right: 6px;
  border-top-width: 1.5px;
  border-right-width: 1.5px;
  border-radius: 0 2px 0 0;
}

/* Bottom corner accents via rivet-panel children */
.gauge-housing .r-bl,
.gauge-housing .r-br {
  width: 14px !important; height: 14px !important;
  border-radius: 0 !important;
  background: none !important;
  box-shadow: none !important;
  border-color: var(--chrome-dim);
  border-style: solid;
  border-width: 0;
  opacity: 0.7;
}
.gauge-housing .r-bl {
  bottom: 6px; left: 6px;
  border-bottom-width: 1.5px !important;
  border-left-width: 1.5px !important;
  border-radius: 0 0 0 2px !important;
}
.gauge-housing .r-br {
  bottom: 6px; right: 6px;
  border-bottom-width: 1.5px !important;
  border-right-width: 1.5px !important;
  border-radius: 0 0 2px 0 !important;
}
/* Hide the top rivets — replaced by corner lines */
.gauge-housing .r-tl,
.gauge-housing .r-tr { display: none; }

.gauge-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--chrome-dim);
  text-align: center;
  background: var(--bg3);
  padding: 2px 10px;
  border-radius: 2px;
  border: 1px solid var(--border);
  margin-bottom: 2px;
}

/* SVG GAUGE */
.gauge-svg-wrap {
  position: relative;
  width: 160px; height: 100px;
  overflow: visible;
}

/* ── BIG AIRTIME DISPLAY ── */
/* ── NIXIE ROW ── */
.nixie-row {
  display: flex;
  background:
    linear-gradient(160deg, rgba(255,220,100,0.03) 0%, transparent 40%),
    var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  overflow: hidden;
  box-shadow:
    inset 0 1px 0 rgba(255,220,100,0.07),
    inset 0 -2px 6px rgba(0,0,0,0.5),
    0 2px 8px rgba(0,0,0,0.5),
    0 0 0 1px rgba(0,0,0,0.3);
  position: relative;
}
.nixie-panel {
  flex: 1;
  padding: 14px 16px;
  position: relative;
}
.nixie-divider {
  width: 1px;
  background: var(--border2);
  margin: 10px 0;
}
.nixie-sm {
  font-size: 40px !important;
}
.nixie-dist {
  color: var(--white) !important;
  text-shadow:
    0 0 8px rgba(240,220,160,0.6),
    0 0 20px rgba(240,220,160,0.25) !important;
}

.airtime-housing {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 16px 20px;
  position: relative;
  overflow: hidden;
  box-shadow:
    inset 0 2px 6px rgba(0,0,0,0.5),
    inset 0 -1px 0 rgba(240,180,20,0.05);
}

/* All four corner screws */
.airtime-housing .screw {
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--chrome-hi), var(--chrome-dim));
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.6);
}
.screw.tl { top:6px; left:6px; }
.screw.tr { top:6px; right:6px; }
.screw.bl { bottom:6px; left:6px; }
.screw.br { bottom:6px; right:6px; }

.airtime-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--chrome-dim);
  margin-bottom: 8px;
}

/* Nixie-tube-style digits */
.nixie {
  font-family: 'Share Tech Mono', monospace;
  font-size: 52px;
  line-height: 1;
  color: var(--ice);
  text-shadow:
    0 0 8px rgba(240,168,0,0.85),
    0 0 20px rgba(240,168,0,0.45),
    0 0 40px rgba(240,168,0,0.22);
  letter-spacing: 0.05em;
}
.nixie .unit {
  font-size: 18px;
  opacity: 0.6;
  vertical-align: bottom;
  margin-left: 2px;
}

.airtime-sub {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  color: var(--white-dim);
  margin-top: 4px;
  letter-spacing: 0.05em;
}

/* ── WAVEFORM / STRIP CHART ── */
.strip-housing {
  background:
    linear-gradient(180deg, rgba(255,220,100,0.03) 0%, transparent 20%),
    var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  overflow: hidden;
  position: relative;
  box-shadow:
    inset 0 1px 0 rgba(255,220,100,0.06),
    inset 0 -2px 6px rgba(0,0,0,0.5),
    0 2px 8px rgba(0,0,0,0.5),
    0 0 0 1px rgba(0,0,0,0.3);
}
.strip-header {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(90deg, var(--bg3) 0%, var(--bg2) 100%);
}
.strip-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--chrome-dim);
}
.strip-hz {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--border2);
}
canvas#analogWave {
  display: block;
  width: 100%;
  height: 160px;
  background: #080600;
}

/* ── JUMP LOG ── */
.log-housing {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  overflow: hidden;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
}
.log-header {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg3);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.log-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--chrome-dim);
}
.log-scroll {
  max-height: 240px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.log-entry {
  display: grid;
  grid-template-columns: 32px 1fr 1fr 1fr 1fr;
  padding: 10px 14px;
  border-bottom: 1px solid rgba(58,52,32,0.5);
  gap: 4px;
  align-items: center;
  transition: background 0.1s;
}
.log-entry:hover { background: var(--bg3); }
.log-entry.new-entry { animation: log-in 0.4s ease-out; }
@keyframes log-in {
  from { background: rgba(240,168,0,0.07); transform: translateX(-6px); opacity: 0; }
  to { background: transparent; transform: none; opacity: 1; }
}

.le-num {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--border2);
}
.le-stat { display: flex; flex-direction: column; gap: 1px; }
.le-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  color: var(--white);
}
.le-lbl {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  text-transform: uppercase;
  color: var(--border2);
  letter-spacing: 0.08em;
}
.le-delta {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
}
.delta-up   { color: var(--green); }
.delta-down { color: var(--red); }
.delta-same { color: var(--border2); }

.le-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--ice);
  text-align: right;
}
.is-best .le-num::before {
  content: '★';
  display: block;
  color: var(--chrome);
  font-size: 10px;
}

/* ═══════════════════════════════════════════════
   COCKPIT CONTROLS — 1969 Analog Aircraft Panel
   Reference: WW2/Korea era instrument panels
   Materials: Bakelite toggles, olive drab panel,
   brass hardware, aged cream stencil lettering
═══════════════════════════════════════════════ */

.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  /* Olive drab instrument panel */
  background:
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 2px,
      rgba(240,168,0,0.02) 2px,
      rgba(240,168,0,0.02) 3px
    ),
    linear-gradient(180deg, #141008 0%, #0c0a04 50%, #100e06 100%);
  border: 2px solid #2e2408;
  border-radius: 4px;
  padding: 14px 12px;
  box-shadow:
    inset 0 2px 6px rgba(0,0,0,0.5),
    inset 0 -1px 0 rgba(255,255,255,0.03),
    0 3px 10px rgba(0,0,0,0.6),
    /* Rivets on corners */
    inset 6px 6px 0 rgba(255,255,255,0), /* placeholder, real rivets below */
    0 0 0 1px rgba(0,0,0,0.5);
  position: relative;
}

/* Panel corner rivets */
.controls::before,
.controls::after {
  content: '';
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%,
    var(--chrome-hi), var(--chrome-dim));
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.8), 0 1px 0 rgba(255,255,255,0.1);
  top: 6px;
}
.controls::before { left: 6px; }
.controls::after  { right: 6px; }

/* ── TOGGLE SWITCH BUTTON
   Looks like a black Bakelite rocker/pushbutton
   mounted into the olive panel with a chrome collar
*/
.btn {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 0;
  border: none;
  outline: none;
  border-radius: 3px;
  position: relative;
  display: block;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  transition: transform 0.07s ease, box-shadow 0.07s ease;

  /* Chrome mounting collar around the switch */
  background: linear-gradient(145deg,
    #3a2e10 0%, #2a2008 30%,
    #1a1604 60%, #241c08 100%);
  box-shadow:
    0 4px 0 #060400,
    0 5px 0 rgba(0,0,0,0.6),
    0 6px 10px rgba(0,0,0,0.7),
    inset 0 1px 0 rgba(240,200,80,0.25),
    inset 0 -1px 0 rgba(0,0,0,0.6),
    inset 1px 0 0 rgba(240,200,80,0.10),
    inset -1px 0 0 rgba(0,0,0,0.4);
  border-top: 1px solid rgba(240,200,80,0.20);
  border-left: 1px solid rgba(240,200,80,0.10);
  border-right: 1px solid rgba(0,0,0,0.5);
  border-bottom: 1px solid rgba(0,0,0,0.7);
}

/* Label plate — cream/ivory aged stencil look
   sits below the switch cap like a placard
*/
.btn-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  /* Recessed label placard */
  margin: 4px 3px 3px;
  padding: 12px 8px 10px;
  border-radius: 2px;
  background: linear-gradient(180deg,
    #0c0a04 0%, #080600 100%);
  box-shadow:
    inset 0 2px 5px rgba(0,0,0,0.8),
    inset 0 1px 2px rgba(0,0,0,0.9),
    0 1px 0 rgba(255,255,255,0.05);
  border-top: 1px solid #060704;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: padding 0.07s ease, box-shadow 0.07s ease;
  /* Aged cream stencil text */
  color: var(--chrome-hi);
  text-shadow: 0 1px 0 rgba(0,0,0,0.9);
}

/* Toggle cap — the raised Bakelite switch nub at top */
.btn::before {
  content: '';
  position: absolute;
  top: -1px; left: 50%;
  transform: translateX(-50%);
  width: 50%; height: 8px;
  border-radius: 2px 2px 0 0;
  background: linear-gradient(180deg,
    #1a1608 0%, #100e04 60%, #0c0a02 100%);
  box-shadow:
    inset 0 1px 0 rgba(240,200,80,0.15),
    inset 1px 0 0 rgba(240,200,80,0.06),
    0 -1px 0 rgba(0,0,0,0.5);
  z-index: 2;

*/

<script>
'use strict';

/* ── Signal Processor (same math as production) ── */
const SP = {
  mag: (x,y,z) => Math.sqrt(x*x+y*y+z*z),
  lpf: (s, last, a) => a*s + (1-a)*last,
  toG: v => v / 9.81,
};

/* ── State Machine ── */
class FSM {
  static S = { GROUND:'GROUND', AIR:'AIR', LAND:'LAND' };
  constructor(cfg, onJump, onState) {
    this.cfg = cfg;
    this.onJump = onJump; this.onState = onState;
    this._s = FSM.S.GROUND;
    this._t0 = null; this._peakG = 0; this._peakW = 0;
    this._fsSamples = 0; this._filtGyro = 0; this._count = 0;
  }
  update(mag, rawMag, gyro, ts, speedMph) {
    // mag = LPF filtered (good for freefall — removes engine vibration)
    // rawMag = unfiltered (good for landing — preserves impact spike)
    // speedMph = current GPS speed for speed gate
    this._filtGyro = SP.lpf(gyro, this._filtGyro, 0.2);
    switch(this._s) {
      case FSM.S.GROUND:
        // Speed gate — must be moving above minimum speed to count as a jump
        // Prevents hand wiggles and stationary false positives
        const minSpd = this.cfg.minSpeedMph || 5;
        const moving = (speedMph !== null && speedMph >= minSpd);
        if (mag < this.cfg.ff && moving) {
          if (++this._fsSamples >= 4) { this._to(FSM.S.AIR, ts); this._t0=ts; this._peakG=0; this._peakW=0; }
        } else this._fsSamples=0;
        break;
      case FSM.S.AIR:
        if (gyro > this._peakW) this._peakW = gyro;
        if (rawMag > this._peakG) this._peakG = rawMag;
        // Auto-cancel if airborne > 3 seconds — must be a false positive
        if (ts - this._t0 > 3000) { this._to(FSM.S.GROUND, ts); this._fsSamples=0; break; }
        // Use RAW magnitude for landing detection, filtered for impact recording
        if (rawMag > this.cfg.land) { this._to(FSM.S.LAND, ts); this._doLand(mag, rawMag, ts); }
        break;
      case FSM.S.LAND:
        if (rawMag < 1.5) this._to(FSM.S.GROUND, ts);
        break;
    }
    return this._s;
  }
  _doLand(filtG, rawG, ts) {
    const ms = ts - this._t0;
    if (ms < this.cfg.minMs) return;
    this._count++;
    // Use filtered G for recorded impact — raw is too spiky on handlebar mount
    // Cap at 8G max — anything higher is handlebar vibration, not real impact
    const impactG = Math.min(8.0, parseFloat(filtG.toFixed(2)));
    this.onJump(Object.freeze({ id:this._count, timestamp:new Date(), airtimeMs:Math.round(ms), impactG, peakW:Math.round(this._peakW) }));
  }
  _to(s, ts) { const p=this._s; this._s=s; if(p!==s) this.onState(s,p); }
  get state() { return this._s; }
}

/* ── Waveform Renderer — scrollable session history ── */
class Wave {
  constructor(el) {
    this._c   = el;
    this._ctx = el.getContext('2d');

    // Large history buffer — 18000 samples ≈ 5 min at 60Hz
    this._HIST  = 18000;
    this._hist  = new Float32Array(this._HIST);
    this._head  = 0;      // next write position
    this._total = 0;      // total samples written

    // Scroll state
    this._live       = true;   // live mode = always show latest
    this._scrollPos  = 0;      // index of leftmost visible sample (in live mode ignored)
    this._viewWidth  = 300;    // how many samples visible at once

    // Jump markers [{sampleIdx, label}]
    this._markers = [];
    // Airborne regions [{start, end, label}]
    this._airRegions = [];
    this._currentAirStart = null;

    this._ff   = 0.80;
    this._land = 1.5;
    this._swMode = false;
    this._dirty = false;

    // Touch/drag scrubbing
    this._dragStart = null;
    this._dragScrollStart = null;
    this._autoResumeTimer = null;
    this._bindTouch();

    new ResizeObserver(() => this._resize()).observe(el.parentElement);
    this._resize();
    requestAnimationFrame(() => this._loop());
  }

  push(v) {
    this._hist[this._head % this._HIST] = v;
    this._head++;
    this._total++;
    if (this._live) {
      this._scrollPos = Math.max(0, this._total - this._viewWidth);
    }
    this._dirty = true;
  }

  // Call when bike goes airborne
  markAirStart() {
    this._currentAirStart = this._total;
  }

  // Call when bike lands — closes the region
  markAirEnd(jumpLabel) {
    if (this._currentAirStart === null) return;
    this._airRegions.push({ start: this._currentAirStart, end: this._total, label: jumpLabel });
    if (this._airRegions.length > 50) this._airRegions.shift();
    this._currentAirStart = null;
  }

  // Call when a jump lands to place a marker on the waveform
  markJump(label) {
    this._markers.push({ idx: this._total - 1, label });
    // Keep only last 50 markers
    if (this._markers.length > 50) this._markers.shift();
  }

  _bindTouch() {
    const el = this._c;

    // Touch drag to scrub
    el.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        this._dragStart = e.touches[0].clientX;
        this._dragScrollStart = this._scrollPos;
        this._live = false;
        this._clearAutoResume();
        this._updateLiveBtn();
      }
    }, { passive: true });

    el.addEventListener('touchmove', e => {
      if (this._dragStart === null || e.touches.length !== 1) return;
      const dx       = e.touches[0].clientX - this._dragStart;
      const dpr      = window.devicePixelRatio || 1;
      const pxPerSample = this._c.width / dpr / this._viewWidth;
      const deltaSamples = Math.round(-dx / pxPerSample);
      this._scrollPos = Math.max(0,
        Math.min(Math.max(0, this._total - this._viewWidth),
          this._dragScrollStart + deltaSamples));
      this._dirty = true;
    }, { passive: true });

    el.addEventListener('touchend', () => {
      this._dragStart = null;
      this._startAutoResume();
    }, { passive: true });

    // Mouse drag for desktop testing
    el.addEventListener('mousedown', e => {
      this._dragStart = e.clientX;
      this._dragScrollStart = this._scrollPos;
      this._live = false;
      this._clearAutoResume();
      this._updateLiveBtn();
    });
    el.addEventListener('mousemove', e => {
      if (this._dragStart === null) return;
      const dx = e.clientX - this._dragStart;
      const dpr = window.devicePixelRatio || 1;
      const pxPerSample = this._c.width / dpr / this._viewWidth;
      const deltaSamples = Math.round(-dx / pxPerSample);
      this._scrollPos = Math.max(0,
        Math.min(Math.max(0, this._total - this._viewWidth),
          this._dragScrollStart + deltaSamples));
      this._dirty = true;
    });
    el.addEventListener('mouseup', () => {
      this._dragStart = null;
      this._startAutoResume();
    });
    el.addEventListener('mouseleave', () => {
      this._dragStart = null;
      this._startAutoResume();
    });
  }

  // Auto-resume live mode 5 seconds after last user interaction
  _startAutoResume() {
    this._clearAutoResume();
    this._autoResumeTimer = setTimeout(() => {
      this.goLive();
    }, 5000);
  }

  _clearAutoResume() {
    if (this._autoResumeTimer) {
      clearTimeout(this._autoResumeTimer);
      this._autoResumeTimer = null;
    }
  }

  goLive() {
    this._live = true;
    this._scrollPos = Math.max(0, this._total - this._viewWidth);
    this._dirty = true;
    this._updateLiveBtn();
  }

  _updateLiveBtn() {
    const btn = document.getElementById('waveformLiveBtn');
    if (!btn) return;
    btn.style.opacity  = this._live ? '0' : '1';
    btn.style.pointerEvents = this._live ? 'none' : 'auto';
  }

  _resize() {
    const dpr = window.devicePixelRatio || 1;
    const p   = this._c.parentElement;
    this._c.width  = p.clientWidth * dpr;
    this._c.height = 160 * dpr;
    this._c.style.width  = p.clientWidth + 'px';
    this._c.style.height = '160px';
    // Recalculate how many samples fit in view
    this._viewWidth = Math.round(p.clientWidth * 0.6); // ~0.6 samples per pixel
    this._dirty = true;
  }

  _loop() {
    if (this._dirty) { this._draw(); this._dirty = false; }
    requestAnimationFrame(() => this._loop());
  }

  _draw() {
    const ctx = this._ctx;
    const W   = this._c.width, H = this._c.height;
    const dpr = window.devicePixelRatio || 1;
    const PAD = 8 * dpr, DH = H - PAD * 2;

    ctx.clearRect(0, 0, W, H);
    const sw = this._swMode;
    const traceColor   = sw ? '#00d4ff' : '#f0a800';
    const glowColor    = sw ? 'rgba(0,212,255,0.5)'  : 'rgba(240,168,0,0.5)';
    const brightColor  = sw ? '#80f0ff' : '#ffe040';
    const brightGlow   = sw ? 'rgba(0,230,255,0.9)'  : 'rgba(255,200,0,0.9)';
    const ffColor      = sw ? 'rgba(0,255,136,0.5)'  : 'rgba(96,200,64,0.4)';
    const landColor    = sw ? 'rgba(255,48,48,0.6)'  : 'rgba(232,64,48,0.5)';
    const gridColor    = sw ? 'rgba(0,48,72,0.6)'    : 'rgba(58,46,8,0.5)';
    const bgColor      = sw ? '#000a0f'              : '#080600';
    const airFillTop   = sw ? 'rgba(0,212,255,0.15)' : 'rgba(240,168,0,0.18)';
    const airFillMid   = sw ? 'rgba(0,212,255,0.06)' : 'rgba(240,168,0,0.08)';
    const airFillBot   = sw ? 'rgba(0,212,255,0.01)' : 'rgba(240,168,0,0.02)';
    const takeoffLine  = sw ? 'rgba(0,255,136,0.7)'  : 'rgba(168,200,32,0.7)';
    const landLine     = sw ? 'rgba(255,80,80,0.7)'  : 'rgba(232,100,32,0.7)';
    const markerColor  = sw ? 'rgba(0,212,255,0.8)'  : 'rgba(240,200,64,0.8)';
    const markerLine   = sw ? 'rgba(0,212,255,0.5)'  : 'rgba(240,200,64,0.6)';

    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, W, H);

    // Grid — horizontal lines
    ctx.strokeStyle = gridColor;
    ctx.lineWidth = 1;
    for (let i = 1; i < 8; i++) {
      const y = PAD + DH / 8 * i;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    // Vertical grid lines
    ctx.strokeStyle = gridColor;
    for (let i = 1; i < 8; i++) {
      const x = W / 8 * i;
      ctx.beginPath(); ctx.moveTo(x, PAD); ctx.lineTo(x, H - PAD); ctx.stroke();
    }

    const yMax = Math.max(4, this._land * 1.5);
    const ys   = DH / yMax;

    // Threshold lines
    const ffy = PAD + DH - this._ff   * ys;
    const ldy = PAD + DH - this._land * ys;
    ctx.setLineDash([3 * dpr, 5 * dpr]);
    ctx.strokeStyle = ffColor; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, ffy); ctx.lineTo(W, ffy); ctx.stroke();
    ctx.strokeStyle = landColor;
    ctx.beginPath(); ctx.moveTo(0, ldy); ctx.lineTo(W, ldy); ctx.stroke();
    ctx.setLineDash([]);

    const start = this._scrollPos;
    const end   = start + this._viewWidth;
    const len   = Math.min(end, this._total) - start;
    if (len < 2) return;

    // ── Airborne regions — glowing amber fill
    const allRegions = [...this._airRegions];
    // Add current in-flight region if airborne right now
    if (this._currentAirStart !== null) {
      allRegions.push({ start: this._currentAirStart, end: this._total, label: null });
    }
    for (const region of allRegions) {
      const rStart = Math.max(region.start, start);
      const rEnd   = Math.min(region.end,   end);
      if (rEnd <= rStart) continue;
      const x1 = ((rStart - start) / (this._viewWidth - 1)) * W;
      const x2 = ((rEnd   - start) / (this._viewWidth - 1)) * W;
      // Background fill — warm amber glow
      const grad = ctx.createLinearGradient(0, PAD, 0, H - PAD);
      grad.addColorStop(0,   airFillTop);
      grad.addColorStop(0.5, airFillMid);
      grad.addColorStop(1,   airFillBot);
      ctx.fillStyle = grad;
      ctx.fillRect(x1, PAD, x2 - x1, DH);
      // Left edge line (takeoff)
      ctx.strokeStyle = takeoffLine;
      ctx.lineWidth   = 1.5 * dpr;
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(x1, PAD); ctx.lineTo(x1, H - PAD); ctx.stroke();
      // Right edge line (landing) — only if completed
      if (region.label) {
        ctx.strokeStyle = landLine;
        ctx.beginPath(); ctx.moveTo(x2, PAD); ctx.lineTo(x2, H - PAD); ctx.stroke();
      }
    }

    // ── Waveform trace — brighter glow inside airborne regions
    ctx.shadowColor = glowColor;
    ctx.shadowBlur  = 5 * dpr;
    ctx.strokeStyle = traceColor;
    ctx.lineWidth   = 2 * dpr;
    ctx.lineJoin    = 'round';
    ctx.beginPath();
    for (let i = 0; i < len; i++) {
      const sampleIdx = (start + i) % this._HIST;
      const v = this._hist[(sampleIdx + this._HIST) % this._HIST];
      const x = (i / (this._viewWidth - 1)) * W;
      const y = PAD + DH - Math.min(v * ys, DH);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Second brighter pass over airborne regions
    ctx.shadowBlur  = 12 * dpr;
    ctx.shadowColor = brightGlow;
    ctx.strokeStyle = brightColor;
    ctx.lineWidth   = 2.5 * dpr;
    for (const region of allRegions) {
      const rStart = Math.max(region.start, start);
      const rEnd   = Math.min(region.end,   end);
      if (rEnd <= rStart) continue;
      ctx.beginPath();
      for (let i = rStart - start; i <= rEnd - start && i < len; i++) {
        if (i < 0) continue;
        const sampleIdx = (start + i) % this._HIST;
        const v = this._hist[(sampleIdx + this._HIST) % this._HIST];
        const x = (i / (this._viewWidth - 1)) * W;
        const y = PAD + DH - Math.min(v * ys, DH);
        i === rStart - start ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    ctx.shadowBlur = 0;

    // ── Jump markers
    ctx.font = `${9 * dpr}px Share Tech Mono`;
    for (const m of this._markers) {
      if (m.idx < start || m.idx >= end) continue;
      const x = ((m.idx - start) / (this._viewWidth - 1)) * W;
      // Vertical line
      ctx.strokeStyle = markerLine;
      ctx.lineWidth   = 1.5 * dpr;
      ctx.setLineDash([4 * dpr, 3 * dpr]);
      ctx.beginPath(); ctx.moveTo(x, PAD); ctx.lineTo(x, H - PAD); ctx.stroke();
      ctx.setLineDash([]);
      // Label
      ctx.fillStyle = markerColor;
      ctx.fillText(m.label, x + 3 * dpr, PAD + 10 * dpr);
    }

    // ── Threshold labels
    ctx.fillStyle = ffColor;
    ctx.font = `${8 * dpr}px Share Tech Mono`;
    ctx.fillText(`${this._ff}G`, 4 * dpr, ffy - 3 * dpr);
    ctx.fillStyle = landColor;
    ctx.fillText(`${this._land}G`, 4 * dpr, ldy - 3 * dpr);

    // ── Scroll position indicator (mini scrollbar)
    if (this._total > this._viewWidth) {
      const barH   = 3 * dpr;
      const barY   = H - barH;
      const ratio  = this._viewWidth / this._total;
      const barW   = W * ratio;
      const barX   = (this._scrollPos / this._total) * W;
      ctx.fillStyle = 'rgba(80,60,10,0.5)';
      ctx.fillRect(0, barY, W, barH);
      ctx.fillStyle = this._live ? 'rgba(240,168,0,0.6)' : 'rgba(240,200,64,0.9)';
      ctx.fillRect(barX, barY, barW, barH);
    }
  }
}

/* ── Simulator ── */
class Sim {
  constructor(cb, onSpeed) {
    this._cb      = cb;
    this._onSpeed = onSpeed; // callback(mph) to update speedometer
    this._id      = null;
    this._ph      = 'ride';
    this._pht     = 0;
    this._nextT   = this._rideT();
    this._simSpeedMph = 30 + Math.random() * 15; // 30–45 mph approach
  }

  // Realistic MX timing
  _rideT()   { return 600  + Math.random() * 600;  } // 0.6–1.2s between jumps
  _airT()    { return 350  + Math.random() * 650;  } // 0.35–1.0s airtime
  _settleT() { return 300  + Math.random() * 200;  } // 0.3–0.5s settle

  start() {
    let last = performance.now();
    const t = () => {
      const now = performance.now();
      const dt  = now - last; last = now;
      this._pht += dt;
      this._cb(this._frame(now));
      this._id = requestAnimationFrame(t);
    };
    this._id = requestAnimationFrame(t);
  }

  stop() {
    if (this._id) cancelAnimationFrame(this._id);
    this._id = null; this._ph = 'ride'; this._pht = 0; this._nextT = this._rideT();
  }

  _frame(now) {
    const G   = 9.81;
    // Engine vibration noise — 450F ~50Hz harmonic
    const eng = () => (Math.random() - 0.5) * 1.8 * G;
    const trk = () => (Math.random() - 0.5) * 0.6 * G;

    let ax, ay, az, gx, gy, gz;

    switch (this._ph) {

      case 'ride':
        // Normal riding: ~1G total, engine + track vibration
        ax = G + eng() * 0.35 + trk();
        ay = eng() * 0.2; az = eng() * 0.2;
        gx = (Math.random()-0.5)*50; gy=(Math.random()-0.5)*35; gz=(Math.random()-0.5)*35;
        // Vary sim speed realistically during riding
        this._simSpeedMph = Math.max(20, Math.min(50,
          this._simSpeedMph + (Math.random()-0.5)*3));
        this._onSpeed(this._simSpeedMph);
        if (this._pht > this._nextT) this._next('takeoff');
        break;

      case 'takeoff':
        // Compression then launch: ~150ms, mag drops sharply
        { const r = Math.min(1, this._pht / 150);
          ax = Math.max(0.12, (1.0 - r * 5.0)) * G + eng() * 0.08;
          ay = eng() * 0.04; az = eng() * 0.04;
          gx=(Math.random()-0.5)*60; gy=(Math.random()-0.5)*50; gz=(Math.random()-0.5)*50;
          if (this._pht > 150) this._next('air');
        } break;

      case 'air':
        // Freefall: 0.1–0.25G total, smooth gyro whip mid-flight
        { const ap  = this._pht / this._nextT;
          const whip = Math.sin(ap * Math.PI) * 2.5; // peaks mid-air
          ax = (0.12 + (Math.random()-0.5)*0.08) * G;
          ay = (Math.random()-0.5)*0.06*G;
          az = (Math.random()-0.5)*0.06*G;
          gx = whip*90 + (Math.random()-0.5)*15;
          gy = whip*60 + (Math.random()-0.5)*12;
          gz = whip*40 + (Math.random()-0.5)*10;
          if (this._pht > this._nextT) this._next('impact');
        } break;

      case 'impact':
        // Sharp landing spike: 3–6G, decays over ~100ms
        { const r   = Math.max(0, 1 - this._pht / 100);
          const mag = (3.0 + Math.random() * 3.0) * G;
          ax = mag * r;
          ay = (Math.random()-0.5)*mag*0.3*r;
          az = (Math.random()-0.5)*mag*0.3*r;
          gx=(Math.random()-0.5)*180*r; gy=(Math.random()-0.5)*120*r; gz=(Math.random()-0.5)*80*r;
          if (this._pht > 120) this._next('settle');
        } break;

      case 'settle':
        // Riding out landing, speed drops slightly
        this._simSpeedMph = Math.max(15, this._simSpeedMph - 2);
        this._onSpeed(this._simSpeedMph);
        ax = G*0.95 + eng()*0.25; ay=eng()*0.15; az=eng()*0.15;
        gx=(Math.random()-0.5)*45; gy=(Math.random()-0.5)*35; gz=(Math.random()-0.5)*35;
        if (this._pht > this._settleT()) this._next('ride');
        break;
    }

    return { ax, ay, az, gx, gy, gz, timestamp: now, hz: 60 };
  }

  _next(ph) {
    this._ph = ph; this._pht = 0;
    if (ph === 'ride')  { this._nextT = this._rideT(); this._simSpeedMph = 28 + Math.random()*15; }
    if (ph === 'air')   this._nextT = this._airT();
  }
}

/* ── Needle animation ── */
// SVG native transform — pivot at (80,90) matches needle geometry
// Needle helper — SVG native transform, pivot at (80,90)
function setNeedle(id, angleDeg) {
  document.getElementById(id).setAttribute('transform', `rotate(${angleDeg} 80 90)`);
}
// G gauge:      -90deg = 0G,  +90deg = 5G
function gToAngle(g) { return Math.min(90, Math.max(-90, (g / 5) * 180 - 90)); }
// Impact gauge: -90deg = 0G,  +90deg = 6G — kept for log display
function iToAngle(g) { return Math.min(90, Math.max(-90, (g / 6) * 180 - 90)); }
// Speedometer: -90deg = 0mph, +90deg = 80mph
function sToAngle(mph) { return Math.min(90, Math.max(-90, (mph / 80) * 180 - 90)); }

// Distance gauge: -90deg = 0ft, +90deg = 100ft

/* ── GPS Speed Tracker ── */
/* ── Haversine distance formula ──
   Returns distance in feet between two GPS coordinates.
   Accurate for short distances (< 1 mile).
*/
function haversineDistFt(lat1, lon1, lat2, lon2) {
  const R    = 20902231; // Earth radius in feet
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a    = Math.sin(dLat/2) * Math.sin(dLat/2)
             + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180)
             * Math.sin(dLon/2) * Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

class GpsTracker {
  constructor(onStatus) {
    this._speed          = null;   // current speed mph
    this._lastKnownSpeed = null;   // persists between GPS updates — used at takeoff
    this._coords         = null;
    this._lastCoords     = null;   // persists for distance calc
    this._watchId        = null;
    this._onStatus       = onStatus;
  }

  start() {
    if (!navigator.geolocation) { this._onStatus('unavailable'); return; }
    this._onStatus('acquiring');
    this._watchId = navigator.geolocation.watchPosition(
      pos => {
        this._coords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
        this._lastCoords = { ...this._coords };
        const spd = (pos.coords.speed !== null && pos.coords.speed >= 0)
                    ? pos.coords.speed * 2.23694 : 0;
        this._speed = spd;
        if (spd > 1) this._lastKnownSpeed = spd; // only store if actually moving
        this._onStatus('locked');
      },
      err => { this._onStatus(err.code === 1 ? 'denied' : 'unavailable'); },
      { enableHighAccuracy: true, maximumAge: 500, timeout: 10000 }
    );
  }

  stop() {
    if (this._watchId !== null) navigator.geolocation.clearWatch(this._watchId);
    this._watchId = null; this._speed = null; this._coords = null;
    this._lastKnownSpeed = null; this._lastCoords = null;
    this._onStatus('idle');
  }

  snapshotState() {
    // Use last known speed if current is null — GPS may not have updated yet
    const speed  = this._speed ?? this._lastKnownSpeed;
    const coords = this._coords ? {...this._coords} : null;
    return { speed, coords };
  }

  snapshot() { return this._speed ?? this._lastKnownSpeed; }
}


/* ── App ── */
class App {
  constructor() {
    this._filtMag = 1; this._jumps = []; this._sampleCount = 0;
    this._lastHz = 0; this._lastHzTime = performance.now();
    this._airtimeRaf = null;

    this._wave = new Wave(document.getElementById('analogWave'));
    this._fsm  = new FSM(
      { ff:0.80, land:1.5, minMs:150, minSpeedMph:5 },
      e => this._onJump(e),
      (s, prev) => this._onState(s, prev)
    );
    this._session = null; this._sim = null;
    this._gps = new GpsTracker(status => this._updateGpsBadge(status));
    this._takeoffGpsState  = null;
    this._takeoffSpeedMph  = null;
    this._lastDistFt       = 0;
    this._arcFactor        = 0.50; // distance correction — tuned per bike type

    document.getElementById('btnEnable').addEventListener('click', () => this._startReal());
    document.getElementById('btnSim').addEventListener('click',    () => this._startSim());
    document.getElementById('btnStop').addEventListener('click',   () => this._stop());
    document.getElementById('btnClear').addEventListener('click',  () => this._clear());
    document.getElementById('btnExport').addEventListener('click', () => this._exportSession());

    this._lastUi = 0;

    // Apply default bike preset last — after all state is initialized
    this._bikeType = 'electric';
    this.setBikeType('electric');
  }

  _frame(f) {
    const rawMag = SP.toG(SP.mag(f.ax, f.ay, f.az));
    this._filtMag = SP.lpf(rawMag, this._filtMag, 0.25);
    const gyroMag = SP.mag(f.gx, f.gy, f.gz);

    this._sampleCount++;
    const now = performance.now();
    if (now - this._lastHzTime > 1000) {
      this._lastHz = this._sampleCount; this._sampleCount = 0; this._lastHzTime = now;
    }

    const currentSpeedMph = this._gps.snapshot() ?? this._takeoffSpeedMph;
    this._fsm.update(this._filtMag, rawMag, gyroMag, f.timestamp, currentSpeedMph);
    this._wave.push(this._filtMag);

    if (now - this._lastUi > 40) {
      this._lastUi = now;
      // Update G needle
      setNeedle('gNeedle', gToAngle(this._filtMag));
      document.getElementById('gText').textContent = this._filtMag.toFixed(2)+'G';

      // Digital speedometer — live GPS
      const spd = this._gps.snapshot();
      if (spd !== null) {
        const spdR = Math.round(spd);
        const sEl  = document.getElementById('sText');
        sEl.textContent = spdR;
        sEl.className   = 'speed-number' + (spd >= 50 ? ' fast' : spd >= 25 ? ' mid' : '');
        document.getElementById('sBar').style.width = Math.min(100,(spd/80)*100)+'%';
        document.getElementById('sStatus').textContent = spd > 1 ? 'GPS LIVE' : 'STOPPED';
      }

      // Distance nixie — live estimate while airborne
      const tState = this._takeoffGpsState;
      if (this._fsm.state === FSM.S.AIR && this._fsm._t0 && tState && tState.speed !== null) {
        const elapsedS = (performance.now() - this._fsm._t0) / 1000;
        const speedFps = tState.speed * 1.46667;
        const estFt    = Math.round(speedFps * elapsedS * this._arcFactor);
        this._lastDistFt = estFt;
        document.getElementById('nixieDist').innerHTML = estFt + '<span class="unit">rel</span>';
        document.getElementById('distSub').textContent = 'IN FLIGHT';
      } else if (this._fsm.state === FSM.S.AIR && this._fsm._t0 && (!tState || tState.speed === null)) {
        // Airborne but no GPS — show airtime-based running estimate
        const elapsedS = (performance.now() - this._fsm._t0) / 1000;
        const estFt    = Math.round(25 * 1.46667 * elapsedS * this._arcFactor);
        document.getElementById('nixieDist').innerHTML = '~' + estFt + '<span class="unit">rel</span>';
        document.getElementById('distSub').textContent = 'IN FLIGHT';
      } else if (this._fsm.state !== FSM.S.AIR && !this._jumps.length) {
        document.getElementById('distSub').textContent = 'RELATIVE';
      }
      document.getElementById('stripHz').textContent = this._lastHz + ' Hz';

      // Airtime — only count up while airborne, hold last jump value otherwise
      if (this._fsm.state === FSM.S.AIR && this._fsm._t0) {
        const elapsed = (performance.now() - this._fsm._t0) / 1000;
        document.getElementById('nixieTime').innerHTML = elapsed.toFixed(3) + '<span class="unit">s</span>';
      }
      // Note: after landing, _onJump sets the final airtime — we don't touch it here
    }
  }

  _onState(s, prev) {
    if (s === FSM.S.AIR) {
      this._takeoffGpsState = this._gps.snapshotState();
      this._takeoffSpeedMph = this._takeoffGpsState.speed;
      this._wave.markAirStart();
    }
    if (s === FSM.S.LAND) {
      this._fsm._t0 = null; // freeze airtime counter immediately
      this._flashImpact();
    }
    // Auto-cancelled false positive — reset display back to last real jump
    if (s === FSM.S.GROUND && prev === FSM.S.AIR) {
      this._wave._currentAirStart = null; // remove the in-flight region
      const lastJump = this._jumps[0];
      if (lastJump) {
        document.getElementById('nixieTime').innerHTML = (lastJump.airtimeMs/1000).toFixed(3) + '<span class="unit">s</span>';
      } else {
        document.getElementById('nixieTime').innerHTML = '0.000<span class="unit">s</span>';
      }
    }
  }

  _flashImpact() {
    // Brief red screen flash on landing — subtle
    document.body.style.transition = 'background 0.05s';
    document.body.style.background = 'rgba(232,72,32,0.12)';
    setTimeout(() => { document.body.style.background = ''; }, 120);
  }

  _setSessionActive(on) {
    const badges = ['accel','gyro','session'];
    badges.forEach(name => {
      const badge = document.getElementById(name+'Badge');
      const dot   = document.getElementById(name+'Dot');
      if (on) {
        badge.classList.add('active');
        dot.classList.add('pulse');
      } else {
        badge.classList.remove('active');
        dot.classList.remove('pulse');
      }
    });
    document.getElementById('sessionLabel').textContent = on ? 'LIVE' : 'IDLE';
    document.getElementById('btnStop').disabled   = !on;
    document.getElementById('btnEnable').disabled =  on;
    document.getElementById('btnSim').disabled    =  on;
  }

  _exportSession() {
    if (!this._jumps.length) {
      alert('No jumps to export yet.');
      return;
    }

    const payload = {
      exportedAt:    new Date().toISOString(),
      bikeType:      this._bikeType,
      settings: {
        freefallThresholdG: this._fsm.cfg.ff,
        landingThresholdG:  this._fsm.cfg.land,
        minAirtimeMs:       this._fsm.cfg.minMs,
        arcFactor:          this._arcFactor,
        lpfAlpha:           0.25,
      },
      sessionSummary: {
        totalJumps:       this._jumps.length,
        bestAirtimeSec:   Math.max(...this._jumps.map(j => j.airtimeMs)) / 1000,
        bestDistanceFt:   Math.max(...this._jumps.filter(j => j.distanceFt).map(j => j.distanceFt)),
        avgAirtimeSec:    (this._jumps.reduce((a,j) => a + j.airtimeMs, 0) / this._jumps.length / 1000).toFixed(3),
        avgImpactG:       (this._jumps.reduce((a,j) => a + j.impactG, 0) / this._jumps.length).toFixed(2),
      },
      jumps: [...this._jumps].reverse().map(j => ({
        id:              j.id,
        timestamp:       j.timestamp.toISOString(),
        airtimeSec:      (j.airtimeMs / 1000).toFixed(3),
        airtimeMs:       j.airtimeMs,
        impactG:         j.impactG,
        takeoffSpeedMph: j.takeoffSpeedMph ?? null,
        relativeDistance: j.distanceFt,
        peakRotationDps: j.peakW,
      })),
    };

    const json     = JSON.stringify(payload, null, 2);
    const blob     = new Blob([json], { type: 'application/json' });
    const url      = URL.createObjectURL(blob);
    const a        = document.createElement('a');
    const filename = `braaplabs-session-${new Date().toISOString().slice(0,19).replace(/[:.]/g,'-')}.json`;
    a.href         = url;
    a.download     = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  toggleTheme() {
    const sw   = document.body.classList.toggle('sw');
    const icon = document.getElementById('themeIcon');
    const lbl  = document.getElementById('themeLabel');
    icon.textContent = sw ? '🌙' : '☀';
    lbl.textContent  = sw ? 'GOLDEN' : 'SW MODE';

    if (sw) {
      // ── Snapshot original SVG colors before overwriting
      this._svgSnapshot = [];
      document.querySelectorAll('svg [fill], svg [stroke]').forEach(el => {
        this._svgSnapshot.push({
          el,
          fill:   el.getAttribute('fill'),
          stroke: el.getAttribute('stroke'),
        });
      });
      // Also snapshot gradient stops
      this._gradSnapshot = [];
      document.querySelectorAll('#dialBg stop').forEach(s => {
        this._gradSnapshot.push({ el: s, color: s.getAttribute('stop-color') });
      });

      // ── Apply SW colors
      const sw_colors = {
        '#1c1600': { fill: '#000a0f' },
        '#080600': { fill: '#000810' },
        '#3a2e08': { stroke: '#001d2a', fill: '#000810' },
        '#5a4010': { stroke: '#003858' },
        '#a8c820': { stroke: '#00ff88', fill: '#00ff88' },
        '#f0a800': { stroke: '#00d4ff', fill: '#00d4ff' },
        '#e84820': { stroke: '#ff3030', fill: '#ff3030' },
        '#c8a820': { stroke: '#00b4d8', fill: '#00b4d8' },
        '#7a5808': { stroke: '#005070' },
        '#f0c840': { fill: '#80f0ff' },
      };
      document.querySelectorAll('svg [fill], svg [stroke]').forEach(el => {
        const f = el.getAttribute('fill');
        const s = el.getAttribute('stroke');
        if (f && sw_colors[f]?.fill)   el.setAttribute('fill',   sw_colors[f].fill);
        if (s && sw_colors[s]?.stroke) el.setAttribute('stroke', sw_colors[s].stroke);
      });
      document.querySelectorAll('#dialBg stop').forEach((s, i) => {
        s.setAttribute('stop-color', i === 0 ? '#001020' : '#000810');
      });

    } else {
      // ── Restore exact original colors from snapshot
      if (this._svgSnapshot) {
        this._svgSnapshot.forEach(({ el, fill, stroke }) => {
          if (fill   !== null) el.setAttribute('fill',   fill);
          if (stroke !== null) el.setAttribute('stroke', stroke);
        });
      }
      if (this._gradSnapshot) {
        this._gradSnapshot.forEach(({ el, color }) => {
          el.setAttribute('stop-color', color);
        });
      }
    }

    this._wave._swMode = sw;
    this._wave._dirty  = true;
    localStorage.setItem('motoair-theme', sw ? 'sw' : 'golden');
  }

  setBikeType(type) {
    this._bikeType = type;

    const presets = {
      electric: { ff: 0.80, land: 1.8, minMs: 150, minSpeedMph: 5, arcFactor: 0.65,
        label: '⚡ ELECTRIC — ff:0.80G · land:1.5G · min:150ms · minSpd:5mph' },
      gas:      { ff: 0.25, land: 2.0, minMs: 250, minSpeedMph: 5, arcFactor: 0.85,
        label: '🔥 GAS — ff:0.25G · land:2.0G · min:250ms · minSpd:5mph' },
    };

    const p = presets[type];
    this._fsm.cfg.ff          = p.ff;
    this._fsm.cfg.land        = p.land;
    this._fsm.cfg.minMs       = p.minMs;
    this._fsm.cfg.minSpeedMph = p.minSpeedMph;
    this._arcFactor           = p.arcFactor;
    this._wave._ff      = p.ff;
    this._wave._land    = p.land;
    this._wave._dirty   = true;

    // Update toggle UI
    const slider  = document.getElementById('bikeSlider');
    const elecBtn = document.getElementById('bikeElec');
    const gasBtn  = document.getElementById('bikeGas');
    const info    = document.getElementById('bikePresetInfo');

    slider.className  = type === 'gas' ? 'bike-slider gas' : 'bike-slider';
    elecBtn.classList.toggle('active', type === 'electric');
    gasBtn.classList.toggle('active',  type === 'gas');
    info.textContent  = p.label;
  }

  _updateGpsBadge(status) {
    const badge = document.getElementById('gpsBadge');
    const dot   = document.getElementById('gpsDot');
    const label = document.getElementById('gpsLabel');
    badge.className = 'sensor-badge';
    dot.classList.remove('pulse');
    switch(status) {
      case 'acquiring':
        label.textContent = 'GPS…';
        dot.classList.add('pulse');
        break;
      case 'locked':
        badge.classList.add('active');
        dot.classList.add('pulse');
        label.textContent = 'GPS';
        break;
      case 'denied':
        badge.classList.add('error');
        label.textContent = 'GPS ✗';
        break;
      case 'unavailable':
        label.textContent = 'NO GPS';
        break;
      case 'idle':
      default:
        label.textContent = 'GPS';
        break;
    }
  }

  _updateBestAirtime() {
    if (!this._jumps.length) return;
    const bestJump = this._jumps.reduce((a, b) => a.airtimeMs > b.airtimeMs ? a : b);
    const el = document.getElementById('bestAirtimeVal');
    const distStr = bestJump.distanceFt !== null ? ` · ${bestJump.distanceFt}↔` : '';
    el.textContent = (bestJump.airtimeMs / 1000).toFixed(3) + 's' + distStr;
    el.classList.remove('empty');
  }

  _onJump(e) {
    // ── Distance calculation
    let distFt   = null;
    let distLabel = 'RELATIVE';

    const landingState = this._gps.snapshotState();
    const t = this._takeoffGpsState;

    // Speed-based estimate — most reliable for short jumps (<30ft)
    // GPS position error (±5-10m) exceeds actual jump distance at these speeds
    const speedMph = t?.speed ?? null;
    const estFt = speedMph !== null
      ? Math.round(speedMph * 1.46667 * (e.airtimeMs / 1000) * this._arcFactor)
      : Math.round(25 * 1.46667 * (e.airtimeMs / 1000) * this._arcFactor);
    

    // GPS Haversine — only trust it for longer jumps where GPS error is < 50% of distance
    if (t && t.coords && landingState.coords) {
      const haversine = haversineDistFt(
        t.coords.lat, t.coords.lon,
        landingState.coords.lat, landingState.coords.lon
      );
      // Only use GPS if it moved significantly AND result is plausible vs speed estimate
      // GPS accuracy ~16ft, so only trust it when jump is >40ft
      if (haversine > 40 && haversine < estFt * 2.5) {
        distFt    = Math.round(haversine);
        distLabel = 'RELATIVE';
      } else {
        distFt    = estFt;
        distLabel = 'RELATIVE';
      }
    } else {
      distFt    = estFt;
      distLabel = 'RELATIVE';
    }

    this._lastDistFt = distFt;
    document.getElementById('nixieDist').innerHTML = distFt + '<span class="unit">rel</span>';
    document.getElementById('distSub').textContent = distLabel;

    // Include takeoff speed in event for export diagnostics
    const eventWithDist = Object.freeze({ ...e, distanceFt: distFt, distLabel, takeoffSpeedMph: speedMph ? parseFloat(speedMph.toFixed(1)) : null });
    this._jumps.unshift(eventWithDist);
    document.getElementById('nixieTime').innerHTML = (e.airtimeMs/1000).toFixed(3)+'<span class="unit">s</span>';
    document.getElementById('jumpCountSub').textContent = `SESSION — ${e.id} JUMP${e.id!==1?'S':''}`;
    document.getElementById('logCount').textContent = e.id + ' JUMP' + (e.id!==1?'S':'');
    this._updateBestAirtime();
    this._renderLog();
    // Mark jump on waveform — close the airborne region with label
    this._wave.markAirEnd(`#${eventWithDist.id}`);
    this._wave.markJump(`#${eventWithDist.id}`);
  }

  _renderLog() {
    const container = document.getElementById('logEntries');
    document.getElementById('emptyLog').style.display = 'none';
    container.innerHTML = '';
    const bestMs = Math.max(...this._jumps.map(j=>j.airtimeMs));

    this._jumps.forEach((e, i) => {
      const prev = this._jumps[i+1] || null;
      const d = (curr, pv, hiGood=true) => {
        if (!prev) return '<span class="delta-same">—</span>';
        const diff = curr - pv;
        if (Math.abs(diff) < 0.001) return '<span class="delta-same">=</span>';
        const good = hiGood ? diff>0 : diff<0;
        const cls  = good ? 'delta-up' : 'delta-down';
        const pct  = Math.abs((diff/pv*100)).toFixed(0);
        return `<span class="${cls}">${diff>0?'▲':'▼'}${pct}%</span>`;
      };

      const el = document.createElement('div');
      el.className = 'log-entry new-entry' + (e.airtimeMs===bestMs&&this._jumps.length>1?' is-best':'');
      el.innerHTML = `
        <div class="le-num">#${e.id}</div>
        <div class="le-stat">
          <div class="le-val" style="color:var(--ice)"}>${(e.airtimeMs/1000).toFixed(3)}s</div>
          <div class="le-lbl">airtime</div>
          <div class="le-delta">${d(e.airtimeMs, prev?.airtimeMs, true)}</div>
        </div>
        <div class="le-stat">
          <div class="le-val" style="color:var(--green)">${e.distanceFt !== null ? e.distanceFt+'↔' : '--'}</div>
          <div class="le-lbl">relative</div>
          <div class="le-delta">${e.distanceFt !== null ? d(e.distanceFt, prev?.distanceFt, true) : ''}</div>
        </div>
        <div class="le-stat">
          <div class="le-val" style="color:var(--red)">${e.impactG.toFixed(1)}G</div>
          <div class="le-lbl">impact</div>
          <div class="le-delta">${d(e.impactG, prev?.impactG, false)}</div>
        </div>
        <div class="le-badge">${e.airtimeMs===bestMs&&this._jumps.length>1?'★ BEST':''}</div>
      `;
      container.appendChild(el);
    });
  }

  async _startReal() {
    try {
      if (typeof DeviceMotionEvent.requestPermission === 'function') {
        if (await DeviceMotionEvent.requestPermission() !== 'granted') throw new Error('denied');
      }
      this._motionCb = evt => {
        const a = evt.accelerationIncludingGravity||evt.acceleration, r=evt.rotationRate;
        if(!a||a.x===null) return;
        this._frame({ax:a.x??0,ay:a.y??0,az:a.z??0,gx:r?.alpha??0,gy:r?.beta??0,gz:r?.gamma??0,timestamp:performance.now()});
      };
      window.addEventListener('devicemotion', this._motionCb, {passive:true});
      this._gps.start();
      this._setSessionActive(true);
    } catch(e) { alert('Sensor error: '+e.message); }
  }

  _startSim() {
    this._sim = new Sim(
      f => this._frame(f),
      mph => {
        // Sim drives digital speedometer
        this._takeoffSpeedMph = mph;
        const mphR = Math.round(mph);
        const simEl = document.getElementById('sText');
        simEl.textContent = mphR;
        simEl.className   = 'speed-number' + (mph >= 50 ? ' fast' : mph >= 25 ? ' mid' : '');
        document.getElementById('sBar').style.width = Math.min(100,(mph/80)*100)+'%';
        document.getElementById('sStatus').textContent = 'SIM';
      }
    );
    this._sim.start();
    this._setSessionActive(true);
  }

  _stop() {
    if (this._motionCb) { window.removeEventListener('devicemotion',this._motionCb); this._motionCb=null; }
    if (this._sim) { this._sim.stop(); this._sim=null; }
    this._gps.stop();
    this._takeoffSpeedMph = null;
    this._takeoffGpsState = null;
    this._setSessionActive(false);
  }

  _clear() {
    this._jumps = []; this._fsm._count = 0;
    this._wave._markers = [];
    this._wave._airRegions = [];
    this._wave._currentAirStart = null;
    this._wave._head = 0; this._wave._total = 0; this._wave._scrollPos = 0;
    document.getElementById('logEntries').innerHTML = '';
    document.getElementById('emptyLog').style.display = '';
    document.getElementById('nixieTime').innerHTML = '0.000<span class="unit">s</span>';
    document.getElementById('jumpCountSub').textContent = 'SESSION — 0 JUMPS';
    this._takeoffGpsState = null;
    this._takeoffSpeedMph = null;
    this._lastDistFt = 0;
    document.getElementById('nixieDist').innerHTML = '--<span class="unit">rel</span>';
    document.getElementById('distSub').textContent = 'RELATIVE';
    document.getElementById('sText').textContent = '--';
    document.getElementById('sText').className = 'speed-number';
    document.getElementById('sBar').style.width = '0%';
    document.getElementById('sStatus').textContent = 'NO GPS';
    const best = document.getElementById('bestAirtimeVal');
    best.textContent = '—'; best.classList.add('empty');
  }
}

window.addEventListener('DOMContentLoaded', () => {
  window._app = new App();
  // Restore saved theme
  if (localStorage.getItem('motoair-theme') === 'sw') {
    window._app.toggleTheme();
  }
});
</script>
