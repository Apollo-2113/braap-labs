<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MOTO AIR — Golden Hour</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Michroma&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');

:root {
  --bg:        #0a0900;
  --bg2:       #141008;
  --bg3:       #1c160a;
  --border:    #2e2408;
  --border2:   #504010;
  --chrome:    #c8960a;
  --chrome-dim:#7a5808;
  --chrome-hi: #f0c840;
  --white:     #f0e0a0;
  --white-dim: #907830;
  --red:       #e84820;
  --ice:       #f0a800;
  --ice-dim:   #805800;
  --green:     #a8c820;
  --needle:    #f0a800;
  --glass:     rgba(240,168,0,0.04);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Golden hour grain texture */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(240,180,20,0.022) 3px, rgba(240,180,20,0.022) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(240,180,20,0.012) 80px, rgba(240,180,20,0.012) 81px);
  pointer-events: none; z-index: 0;
}

/* Golden hour vignette */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(6,4,0,0.82) 100%);
  pointer-events: none; z-index: 0;
}

.shell {
  position: relative; z-index: 1;
  max-width: 420px;
  margin: 0 auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── HEADER PLATE ── */
.header-plate {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
  box-shadow:
    inset 0 1px 0 rgba(240,180,20,0.10),
    inset 0 -1px 0 rgba(0,0,0,0.5),
    0 2px 8px rgba(0,0,0,0.6);
}

/* Brushed titanium lines */
.header-plate::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    92deg,
    transparent,
    transparent 2px,
    rgba(240,180,20,0.03) 2px,
    rgba(240,180,20,0.03) 3px
  );
}

.logo {
  font-family: 'Michroma', sans-serif;
  font-size: 20px;
  letter-spacing: 0.2em;
  color: var(--chrome-hi);
  text-shadow: 0 0 20px rgba(240,168,0,0.38);
}
.logo span { color: var(--ice); }

.header-rivets {
  display: flex; gap: 6px; align-items: center;
}
.rivet {
  width: 8px; height: 8px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--chrome-hi), var(--chrome-dim));
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.6), 0 1px 0 rgba(240,180,20,0.14);
}

/* ── STATE BAR ── */
.state-bar {
  display: flex;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
}
.state-seg {
  flex: 1;
  padding: 8px 4px;
  text-align: center;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--border2);
  border-right: 1px solid var(--border);
  position: relative;
  transition: all 0.3s;
}
.state-seg:last-child { border-right: none; }
.state-seg.active-ground {
  color: var(--green);
  background: rgba(168,200,32,0.08);
  text-shadow: 0 0 8px rgba(168,200,32,0.55);
}
.state-seg.active-air {
  color: var(--ice);
  background: rgba(240,168,0,0.09);
  text-shadow: 0 0 8px rgba(64,200,240,0.6);
  animation: flicker 0.8s ease-in-out infinite alternate;
}
.state-seg.active-land {
  color: var(--red);
  background: rgba(232,64,48,0.1);
  text-shadow: 0 0 8px rgba(232,64,48,0.6);
}
@keyframes flicker { from { opacity: 0.7; } to { opacity: 1; } }

/* ── GAUGE ROW ── */
.gauge-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.gauge-housing {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
  box-shadow:
    inset 0 2px 4px rgba(0,0,0,0.5),
    inset 0 -1px 0 rgba(240,180,20,0.05),
    0 1px 3px rgba(0,0,0,0.4);
}

/* Corner screws */
.gauge-housing::before,
.gauge-housing::after {
  content: '';
  position: absolute;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--chrome-hi), var(--chrome-dim));
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.6);
}
.gauge-housing::before { top: 5px; left: 5px; }
.gauge-housing::after  { top: 5px; right: 5px; }

.gauge-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--chrome-dim);
  text-align: center;
}

/* SVG GAUGE */
.gauge-svg-wrap {
  position: relative;
  width: 140px; height: 95px;
  overflow: visible;
}

/* ── BIG AIRTIME DISPLAY ── */
.airtime-housing {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 16px 20px;
  position: relative;
  overflow: hidden;
  box-shadow:
    inset 0 2px 6px rgba(0,0,0,0.5),
    inset 0 -1px 0 rgba(240,180,20,0.05);
}

/* All four corner screws */
.airtime-housing .screw {
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--chrome-hi), var(--chrome-dim));
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.6);
}
.screw.tl { top:6px; left:6px; }
.screw.tr { top:6px; right:6px; }
.screw.bl { bottom:6px; left:6px; }
.screw.br { bottom:6px; right:6px; }

.airtime-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--chrome-dim);
  margin-bottom: 8px;
}

/* Nixie-tube-style digits */
.nixie {
  font-family: 'Share Tech Mono', monospace;
  font-size: 52px;
  line-height: 1;
  color: var(--ice);
  text-shadow:
    0 0 8px rgba(240,168,0,0.85),
    0 0 20px rgba(240,168,0,0.45),
    0 0 40px rgba(240,168,0,0.22);
  letter-spacing: 0.05em;
}
.nixie .unit {
  font-size: 18px;
  opacity: 0.6;
  vertical-align: bottom;
  margin-left: 2px;
}

.airtime-sub {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  color: var(--white-dim);
  margin-top: 4px;
  letter-spacing: 0.05em;
}

/* ── WAVEFORM / STRIP CHART ── */
.strip-housing {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.5);
}
.strip-header {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg3);
}
.strip-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--chrome-dim);
}
.strip-hz {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--border2);
}
canvas#analogWave {
  display: block;
  width: 100%;
  height: 90px;
  background: #080600;
}

/* ── JUMP LOG ── */
.log-housing {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  overflow: hidden;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
}
.log-header {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg3);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.log-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--chrome-dim);
}
.log-scroll {
  max-height: 240px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.log-entry {
  display: grid;
  grid-template-columns: 32px 1fr 1fr 1fr 1fr;
  padding: 10px 14px;
  border-bottom: 1px solid rgba(58,52,32,0.5);
  gap: 4px;
  align-items: center;
  transition: background 0.1s;
}
.log-entry:hover { background: var(--bg3); }
.log-entry.new-entry { animation: log-in 0.4s ease-out; }
@keyframes log-in {
  from { background: rgba(240,168,0,0.07); transform: translateX(-6px); opacity: 0; }
  to { background: transparent; transform: none; opacity: 1; }
}

.le-num {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--border2);
}
.le-stat { display: flex; flex-direction: column; gap: 1px; }
.le-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  color: var(--white);
}
.le-lbl {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  text-transform: uppercase;
  color: var(--border2);
  letter-spacing: 0.08em;
}
.le-delta {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
}
.delta-up   { color: var(--green); }
.delta-down { color: var(--red); }
.delta-same { color: var(--border2); }

.le-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--ice);
  text-align: right;
}
.is-best .le-num::before {
  content: '★';
  display: block;
  color: var(--chrome);
  font-size: 10px;
}

/* ── CONTROLS ── */
.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border-radius: 3px;
  cursor: pointer;
  padding: 11px 16px;
  transition: all 0.12s;
  position: relative;
  overflow: hidden;
  box-shadow:
    inset 0 1px 0 rgba(240,180,20,0.10),
    inset 0 -2px 0 rgba(0,0,0,0.4),
    0 2px 6px rgba(0,0,0,0.5);
}
.btn-start {
  background: linear-gradient(180deg, #0e1e2e 0%, #080e18 100%);
  border: 1px solid #604000;
  color: var(--green);
  text-shadow: 0 0 8px rgba(168,200,32,0.45);
}
.btn-start:hover {
  background: linear-gradient(180deg, #122840 0%, #0a1e30 100%);
  box-shadow: inset 0 1px 0 rgba(240,180,20,0.14), 0 0 12px rgba(240,168,0,0.22);
}
.btn-sim {
  background: linear-gradient(180deg, #0e1a24 0%, #080e16 100%);
  border: 1px solid var(--border2);
  color: var(--ice);
  text-shadow: 0 0 8px rgba(240,168,0,0.32);
}
.btn-sim:hover {
  background: linear-gradient(180deg, #102030 0%, #081018 100%);
}
.btn-stop {
  background: linear-gradient(180deg, #1a0810 0%, #0e0610 100%);
  border: 1px solid #602030;
  color: var(--red);
  opacity: 0.5;
}
.btn-stop:not([disabled]) { opacity: 1; }
.btn-clear {
  background: linear-gradient(180deg, #121820 0%, #0a0e14 100%);
  border: 1px solid var(--border);
  color: var(--white-dim);
}

/* ── FILM GRAIN OVERLAY ── */
.grain-overlay {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 999;
  opacity: 0.055;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='grain'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23grain)'/%3E%3C/svg%3E");
  animation: grain-shift 0.12s steps(1) infinite;
}
@keyframes grain-shift {
  0%   { transform: translate(0,0); }
  25%  { transform: translate(-2px, 1px); }
  50%  { transform: translate(1px, -2px); }
  75%  { transform: translate(2px, 1px); }
  100% { transform: translate(-1px, 2px); }
}

/* ── UNIVERSAL RIVETS — all four corners of every panel ── */
.gauge-housing,
.airtime-housing,
.strip-housing,
.log-housing,
.state-bar,
.header-plate {
  position: relative;
}

/* Use a single ::after for bottom-right rivet on panels that already use ::before/::after */
.rivet-panel {
  position: relative;
}
.rivet-panel .r-tl,
.rivet-panel .r-tr,
.rivet-panel .r-bl,
.rivet-panel .r-br {
  position: absolute;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--chrome-hi), var(--chrome-dim));
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,0,0,0.3);
  z-index: 2;
}
.rivet-panel .r-tl { top:5px;    left:5px;  }
.rivet-panel .r-tr { top:5px;    right:5px; }
.rivet-panel .r-bl { bottom:5px; left:5px;  }
.rivet-panel .r-br { bottom:5px; right:5px; }

/* ── ODOMETER ROLL-UP ── */
.odometer-wrap {
  display: inline-flex;
  overflow: hidden;
  height: 1.1em;
  vertical-align: bottom;
}
.odometer-digit {
  display: flex;
  flex-direction: column;
  transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
}
.odometer-digit span {
  height: 1.1em;
  line-height: 1.1em;
  display: block;
}

.empty-log {
  padding: 32px;
  text-align: center;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--border2);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
</style>
</head>
<body>

<div class="grain-overlay"></div>

<div class="shell">

  <!-- HEADER -->
  <div class="header-plate rivet-panel">
    <div class="r-tl"></div><div class="r-tr"></div>
    <div class="r-bl"></div><div class="r-br"></div>
    <div class="logo">MOTO <span>AIR</span></div>
    <div class="header-rivets">
      <div class="rivet"></div>
      <div class="rivet"></div>
      <div class="rivet"></div>
    </div>
  </div>

  <!-- STATE BAR -->
  <div class="state-bar rivet-panel">
    <div class="r-tl"></div><div class="r-tr"></div>
    <div class="r-bl"></div><div class="r-br"></div>
    <div class="state-seg active-ground" id="seg0">Ground</div>
    <div class="state-seg" id="seg1">Airborne</div>
    <div class="state-seg" id="seg2">Impact</div>
  </div>

  <!-- GAUGE ROW -->
  <div class="gauge-row">

    <!-- G-FORCE GAUGE -->
    <div class="gauge-housing rivet-panel">
      <div class="r-tl"></div><div class="r-tr"></div>
      <div class="r-bl"></div><div class="r-br"></div>
      <div class="gauge-label">G-Force</div>
      <div class="gauge-svg-wrap">
        <svg viewBox="0 0 140 95" width="140" height="95">
          <defs>
            <radialGradient id="dialBg" cx="50%" cy="90%" r="70%">
              <stop offset="0%" stop-color="#1c1600"/>
              <stop offset="100%" stop-color="#060400"/>
            </radialGradient>
            <filter id="needleGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="2" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="arcGlow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="2.5" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <path d="M 8 88 A 62 62 0 0 1 132 88" fill="url(#dialBg)" stroke="#3a2e08" stroke-width="1.5"/>
          <path d="M 4 88 A 66 66 0 0 1 136 88" fill="none" stroke="#5a4010" stroke-width="2"/>
          <!-- Arc zones -->
          <path d="M 12 88 A 58 58 0 0 1 44 38" fill="none" stroke="#a8c820" stroke-width="6" stroke-linecap="butt" opacity="0.75" filter="url(#arcGlow)"/>
          <path d="M 44 38 A 58 58 0 0 1 96 38" fill="none" stroke="#f0a800" stroke-width="6" stroke-linecap="butt" opacity="0.75" filter="url(#arcGlow)"/>
          <path d="M 96 38 A 58 58 0 0 1 128 88" fill="none" stroke="#e84820" stroke-width="6" stroke-linecap="butt" opacity="0.80" filter="url(#arcGlow)"/>
          <!-- Major ticks -->
          <g stroke="#c8a820" stroke-width="1.5">
            <line x1="70" y1="28" x2="70" y2="38" transform="rotate(-90 70 88)"/>
            <line x1="70" y1="28" x2="70" y2="38" transform="rotate(-54 70 88)"/>
            <line x1="70" y1="28" x2="70" y2="38" transform="rotate(-18 70 88)"/>
            <line x1="70" y1="28" x2="70" y2="38" transform="rotate(18 70 88)"/>
            <line x1="70" y1="28" x2="70" y2="38" transform="rotate(54 70 88)"/>
            <line x1="70" y1="28" x2="70" y2="38" transform="rotate(90 70 88)"/>
          </g>
          <!-- Minor ticks -->
          <g stroke="#7a5808" stroke-width="1">
            <line x1="70" y1="30" x2="70" y2="38" transform="rotate(-72 70 88)"/>
            <line x1="70" y1="30" x2="70" y2="38" transform="rotate(-36 70 88)"/>
            <line x1="70" y1="30" x2="70" y2="38" transform="rotate(0 70 88)"/>
            <line x1="70" y1="30" x2="70" y2="38" transform="rotate(36 70 88)"/>
            <line x1="70" y1="30" x2="70" y2="38" transform="rotate(72 70 88)"/>
          </g>
          <!-- Labels -->
          <text x="9"   y="85" font-family="Share Tech Mono" font-size="7" fill="#c8a820" text-anchor="middle">0</text>
          <text x="28"  y="50" font-family="Share Tech Mono" font-size="7" fill="#c8a820" text-anchor="middle">1</text>
          <text x="70"  y="24" font-family="Share Tech Mono" font-size="7" fill="#c8a820" text-anchor="middle">2</text>
          <text x="112" y="50" font-family="Share Tech Mono" font-size="7" fill="#c8a820" text-anchor="middle">3</text>
          <text x="131" y="85" font-family="Share Tech Mono" font-size="7" fill="#c8a820" text-anchor="middle">5</text>
          <!-- Needle — tapered, pivots at (70,88) via SVG transform -->
          <g id="gNeedle" transform="rotate(-90 70 88)">
            <polygon points="70,92 68,98 70,101 72,98" fill="#6a4808"/>
            <polygon points="70,88 69,82 70,30 71,82" fill="#f0a800" filter="url(#needleGlow)"/>
            <circle cx="70" cy="88" r="5.5" fill="#1c1600" stroke="#c8a820" stroke-width="1.5"/>
            <circle cx="70" cy="88" r="2"   fill="#f0c840"/>
          </g>
          <!-- Readout box -->
          <rect x="46" y="66" width="48" height="15" rx="2" fill="#080600" stroke="#3a2e08" stroke-width="1"/>
          <text id="gText" x="70" y="77" text-anchor="middle" font-family="Share Tech Mono" font-size="9" fill="#f0c840">1.00G</text>
        </svg>
      </div>
    </div>

    <!-- ATTITUDE INDICATOR -->
    <div class="gauge-housing rivet-panel" style="padding:10px 8px;">
      <div class="r-tl"></div><div class="r-tr"></div>
      <div class="r-bl"></div><div class="r-br"></div>
      <div class="gauge-label">Attitude</div>
      <canvas id="adiCanvas" width="130" height="130" style="display:block;border-radius:50%;"></canvas>
      <div style="display:flex;justify-content:space-between;width:130px;margin-top:4px">
        <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:#7a5808">ROLL <span id="adiRoll" style="color:#f0c840">0°</span></div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:#7a5808">PITCH <span id="adiPitch" style="color:#f0c840">0°</span></div>
      </div>
    </div>
  </div>

  <!-- AIRTIME — NIXIE DISPLAY -->
  <div class="airtime-housing">
    <div class="screw tl"></div><div class="screw tr"></div>
    <div class="screw bl"></div><div class="screw br"></div>
    <div class="airtime-label">Airtime</div>
    <div class="nixie" id="nixieTime">0.000<span class="unit">s</span></div>
    <div class="airtime-sub" id="jumpCountSub">SESSION — 0 JUMPS</div>
  </div>

  <!-- STRIP CHART -->
  <div class="strip-housing rivet-panel">
    <div class="r-tl"></div><div class="r-tr"></div>
    <div class="r-bl"></div><div class="r-br"></div>
    <div class="strip-header">
      <div class="strip-title">Accel. Magnitude — Filtered</div>
      <div class="strip-hz" id="stripHz">0 Hz</div>
    </div>
    <canvas id="analogWave"></canvas>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="btn btn-start" id="btnEnable">Enable Sensors</button>
    <button class="btn btn-sim"   id="btnSim">▶ Simulate</button>
    <button class="btn btn-stop"  id="btnStop" disabled>■ Stop</button>
    <button class="btn btn-clear" id="btnClear">Clear Log</button>
  </div>

  <!-- JUMP LOG -->
  <div class="log-housing rivet-panel">
    <div class="r-tl"></div><div class="r-tr"></div>
    <div class="r-bl"></div><div class="r-br"></div>
    <div class="log-header">
      <div class="log-title">Jump Record</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--border2)" id="logCount">0 JUMPS</div>
    </div>
    <div class="log-scroll">
      <div class="empty-log" id="emptyLog">Awaiting first jump</div>
      <div id="logEntries"></div>
    </div>
  </div>

</div><!-- /shell -->

<script>
'use strict';

/* ── Signal Processor (same math as production) ── */
const SP = {
  mag: (x,y,z) => Math.sqrt(x*x+y*y+z*z),
  lpf: (s, last, a) => a*s + (1-a)*last,
  toG: v => v / 9.81,
};

/* ── State Machine ── */
class FSM {
  static S = { GROUND:'GROUND', AIR:'AIR', LAND:'LAND' };
  constructor(cfg, onJump, onState) {
    this.cfg = cfg;
    this.onJump = onJump; this.onState = onState;
    this._s = FSM.S.GROUND;
    this._t0 = null; this._peakG = 0; this._peakW = 0;
    this._fsSamples = 0; this._filtGyro = 0; this._count = 0;
  }
  update(mag, gyro, ts) {
    this._filtGyro = SP.lpf(gyro, this._filtGyro, 0.2);
    switch(this._s) {
      case FSM.S.GROUND:
        if (mag < this.cfg.ff && this._filtGyro < 200) {
          if (++this._fsSamples >= 3) { this._to(FSM.S.AIR, ts); this._t0=ts; this._peakG=0; this._peakW=0; }
        } else this._fsSamples=0;
        break;
      case FSM.S.AIR:
        if (gyro > this._peakW) this._peakW = gyro;
        if (mag > this._peakG) this._peakG = mag;
        if (mag > this.cfg.land) { this._to(FSM.S.LAND, ts); this._doLand(mag, ts); }
        break;
      case FSM.S.LAND:
        if (mag < 1.5) this._to(FSM.S.GROUND, ts);
        break;
    }
    return this._s;
  }
  _doLand(impG, ts) {
    const ms = ts - this._t0;
    if (ms < this.cfg.minMs) return;
    this._count++;
    this.onJump(Object.freeze({ id:this._count, timestamp:new Date(), airtimeMs:Math.round(ms), impactG:parseFloat(impG.toFixed(2)), peakW:Math.round(this._peakW) }));
  }
  _to(s, ts) { const p=this._s; this._s=s; if(p!==s) this.onState(s,p); }
  get state() { return this._s; }
}

/* ── Waveform Renderer ── */
class Wave {
  constructor(el) {
    this._c = el; this._ctx = el.getContext('2d');
    this._buf = new Float32Array(300); this._h = 0;
    this._ff = 0.25; this._land = 2.0; this._dirty = false;
    new ResizeObserver(()=>this._resize()).observe(el.parentElement);
    this._resize(); requestAnimationFrame(()=>this._loop());
  }
  push(v) { this._buf[this._h++ % this._buf.length]=v; this._dirty=true; }
  _resize() {
    const dpr=window.devicePixelRatio||1, p=this._c.parentElement;
    this._c.width=p.clientWidth*dpr; this._c.height=90*dpr;
    this._c.style.width=p.clientWidth+'px'; this._c.style.height='90px';
    this._dirty=true;
  }
  _loop() { if(this._dirty){this._draw();this._dirty=false;} requestAnimationFrame(()=>this._loop()); }
  _draw() {
    const ctx=this._ctx, W=this._c.width, H=this._c.height, dpr=window.devicePixelRatio||1;
    const PAD=6*dpr, DH=H-PAD*2;
    ctx.clearRect(0,0,W,H);
    // Dark warm background with subtle grid
    ctx.fillStyle='#0c0b06'; ctx.fillRect(0,0,W,H);
    // Horizontal graph lines (ice, very dim)
    ctx.strokeStyle='rgba(46,61,80,0.4)'; ctx.lineWidth=1;
    for(let i=1;i<4;i++){const y=PAD+DH/4*i;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    const N=this._buf.length, len=Math.min(this._h,N), yMax=Math.max(4,this._land*1.4);
    const ys=DH/yMax;
    // Threshold lines — etched look
    const ffy=PAD+DH-this._ff*ys, ldy=PAD+DH-this._land*ys;
    ctx.strokeStyle='rgba(96,200,64,0.35)'; ctx.setLineDash([3*dpr,5*dpr]); ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,ffy);ctx.lineTo(W,ffy);ctx.stroke();
    ctx.strokeStyle='rgba(232,64,48,0.4)'; ctx.setLineDash([3*dpr,3*dpr]);
    ctx.beginPath();ctx.moveTo(0,ldy);ctx.lineTo(W,ldy);ctx.stroke();
    ctx.setLineDash([]);
    if(len<2) return;
    // Cold titanium trace — precision instrument
    ctx.shadowColor='rgba(240,168,0,0.55)'; ctx.shadowBlur=4*dpr;
    ctx.strokeStyle='#e09000'; ctx.lineWidth=1.2*dpr; ctx.lineJoin='round';
    ctx.beginPath();
    for(let i=0;i<len;i++){
      const bi=(this._h-len+i)%N, v=this._buf[(bi+N)%N];
      const x=(i/(N-1))*W, y=PAD+DH-Math.min(v*ys,DH);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke(); ctx.shadowBlur=0;
    // Labels
    ctx.fillStyle='rgba(168,200,32,0.55)'; ctx.font=`${8*dpr}px Share Tech Mono`;
    ctx.fillText(`${this._ff}G`,4*dpr,ffy-3*dpr);
    ctx.fillStyle='rgba(232,64,48,0.55)';
    ctx.fillText(`${this._land}G`,4*dpr,ldy-3*dpr);
  }
}

/* ── Simulator ── */
class Sim {
  constructor(cb) { this._cb=cb; this._id=null; this._pt=0; this._ph='ride'; this._pht=0; this._nextT=this._rideT(); }
  _rideT(){return 2000+Math.random()*2500;} _airT(){return 400+Math.random()*700;}
  start(){let last=performance.now();const t=()=>{const now=performance.now();this._pt+=now-last;this._pht+=now-last;last=now;this._cb(this._frame(now));this._id=requestAnimationFrame(t);};this._id=requestAnimationFrame(t);}
  stop(){if(this._id)cancelAnimationFrame(this._id);this._id=null;this._ph='ride';this._pht=0;this._nextT=this._rideT();}
  _frame(now){
    const n=()=>(Math.random()-.5)*2.5*9.81, t=()=>(Math.random()-.5)*0.8*9.81;
    let ax,ay,az,gx,gy,gz;
    switch(this._ph){
      case 'ride': ax=9.81+n()*.4+t();ay=n()*.3;az=n()*.3;gx=(Math.random()-.5)*60;gy=(Math.random()-.5)*40;gz=(Math.random()-.5)*40;if(this._pht>this._nextT)this._next('takeoff');break;
      case 'takeoff':{const r=this._pht/200;ax=Math.max(.05,1-r*4.5)*9.81+n()*.1;ay=n()*.05;az=n()*.05;gx=(Math.random()-.5)*80;gy=(Math.random()-.5)*60;gz=(Math.random()-.5)*60;if(this._pht>200)this._next('air');break;}
      case 'air':{const ap=this._pht/this._nextT,w=Math.sin(ap*Math.PI)*3;ax=(.05+(Math.random()-.5)*.06)*9.81;ay=(Math.random()-.5)*.04*9.81;az=(Math.random()-.5)*.04*9.81;gx=w*120+(Math.random()-.5)*20;gy=w*80+(Math.random()-.5)*15;gz=w*60+(Math.random()-.5)*15;if(this._pht>this._nextT)this._next('impact');break;}
      case 'impact':{const r=Math.max(0,1-this._pht/80),m=(3.5+Math.random()*2.5)*9.81;ax=m*r;ay=(Math.random()-.5)*m*.3*r;az=(Math.random()-.5)*m*.3*r;gx=(Math.random()-.5)*200*r;gy=(Math.random()-.5)*150*r;gz=(Math.random()-.5)*100*r;if(this._pht>150)this._next('settle');break;}
      case 'settle': ax=9.81*.9+n()*.3;ay=n()*.2;az=n()*.2;gx=(Math.random()-.5)*50;gy=(Math.random()-.5)*40;gz=(Math.random()-.5)*40;if(this._pht>500)this._next('ride');break;
    }
    return{ax,ay,az,gx,gy,gz,timestamp:now,hz:60};
  }
  _next(ph){this._ph=ph;this._pht=0;if(ph==='ride')this._nextT=this._rideT();if(ph==='air')this._nextT=this._airT();}
}

/* ── Attitude Indicator (ADI) ──
   Retro aircraft artificial horizon.
   - Sky (amber-tinted) above horizon, ground (dark brown) below.
   - Horizon line rolls with bank angle (gx integrated) and
     translates vertically with pitch (gy integrated).
   - Fixed aircraft reference symbol in centre.
   - Roll graduation marks on outer bezel ring.
   - Integrates gyro rates over time, with auto-level when stationary.
*/
class AttitudeIndicator {
  constructor(canvasId) {
    this._canvasId = canvasId;
    this._c    = null;
    this._ctx  = null;
    this._roll  = 0;
    this._pitch = 0;
    this._lastT = performance.now();
    this._rollVel  = 0;
    this._pitchVel = 0;
  }

  _init() {
    if (this._c) return true;
    const el = document.getElementById(this._canvasId);
    if (!el) return false;
    this._c   = el;
    this._ctx = el.getContext('2d');
    if (!this._ctx) return false;
    this._draw();
    return true;
  }

  _draw() {
    if (!this._c || !this._ctx) return;
    const ctx = this._ctx;
    const W = this._c.width;   // use actual pixel dimensions
    const H = this._c.height;
    const CX = W / 2, CY = H / 2;
    const R  = Math.min(W, H) / 2 - 2;

    ctx.clearRect(0, 0, W, H);

    // Pitch offset in pixels — hard clamped
    const pitchPx = Math.max(-(R*0.8), Math.min(R*0.8,
      this._pitch * (H / 80)));

    // ── Sky fill (above horizon)
    ctx.save();
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, Math.PI * 2);
    ctx.clip();

    // Rotate everything inside the circle by roll angle
    ctx.translate(CX, CY);
    ctx.rotate(this._roll * Math.PI / 180);
    ctx.translate(-CX, -CY);

    // Sky
    ctx.fillStyle = '#0d1a30';
    ctx.fillRect(0, 0, W, CY + pitchPx);

    // Ground
    ctx.fillStyle = '#1e0e00';
    ctx.fillRect(0, CY + pitchPx, W, H);

    // Horizon line
    ctx.strokeStyle = '#f0c840';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, CY + pitchPx);
    ctx.lineTo(W, CY + pitchPx);
    ctx.stroke();

    // Pitch lines
    ctx.strokeStyle = 'rgba(240,200,64,0.45)';
    ctx.lineWidth = 1;
    ctx.font = `${Math.round(W*0.07)}px Share Tech Mono`;
    ctx.fillStyle = 'rgba(240,200,64,0.55)';
    ctx.textBaseline = 'middle';
    for (let d = -30; d <= 30; d += 10) {
      if (d === 0) continue;
      const y   = CY + pitchPx - d * (H / 80);
      const len = Math.abs(d) >= 20 ? W * 0.22 : W * 0.14;
      ctx.beginPath();
      ctx.moveTo(CX - len, y);
      ctx.lineTo(CX + len, y);
      ctx.stroke();
      ctx.fillText(Math.abs(d), CX + len + 3, y);
    }

    ctx.restore(); // un-rotate + un-clip

    // ── Fixed aircraft symbol (never rotates)
    const aw = W * 0.22;
    ctx.strokeStyle = '#f0c840';
    ctx.lineWidth = Math.max(2, W * 0.018);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    // Left wing bar
    ctx.beginPath();
    ctx.moveTo(CX - aw, CY);
    ctx.lineTo(CX - aw * 0.4, CY);
    ctx.lineTo(CX - aw * 0.4, CY + W * 0.05);
    ctx.stroke();
    // Right wing bar
    ctx.beginPath();
    ctx.moveTo(CX + aw, CY);
    ctx.lineTo(CX + aw * 0.4, CY);
    ctx.lineTo(CX + aw * 0.4, CY + W * 0.05);
    ctx.stroke();
    // Centre dot
    ctx.fillStyle = '#f0c840';
    ctx.beginPath();
    ctx.arc(CX, CY, W * 0.03, 0, Math.PI * 2);
    ctx.fill();

    // ── Bezel ring + roll ticks (outside clip, drawn last)
    ctx.strokeStyle = '#5a4010';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, Math.PI * 2);
    ctx.stroke();

    // Roll tick marks on bezel
    ctx.strokeStyle = '#c8a820';
    ctx.lineWidth = 1.5;
    for (const deg of [-60, -45, -30, -20, -10, 0, 10, 20, 30, 45, 60]) {
      const rad   = (deg - 90) * Math.PI / 180;
      const outer = R - 1;
      const inner = deg % 30 === 0 ? R - 10 : R - 6;
      ctx.beginPath();
      ctx.moveTo(CX + Math.cos(rad) * outer, CY + Math.sin(rad) * outer);
      ctx.lineTo(CX + Math.cos(rad) * inner, CY + Math.sin(rad) * inner);
      ctx.stroke();
    }

    // Roll pointer triangle (rotates with bank)
    const rRad = (this._roll - 90) * Math.PI / 180;
    const tDist = R - 14;
    ctx.save();
    ctx.translate(CX + Math.cos(rRad) * tDist, CY + Math.sin(rRad) * tDist);
    ctx.rotate(this._roll * Math.PI / 180);
    ctx.fillStyle = '#f0a800';
    ctx.beginPath();
    ctx.moveTo(0, -5);
    ctx.lineTo(-4, 4);
    ctx.lineTo(4, 4);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

/* ── G gauge angle helper ── */
// -90deg = 0G, 0deg = 2.5G, +90deg = 5G
function gToAngle(g) { return Math.min(90, Math.max(-90, (g/5)*180 - 90)); }

   Spring-damper system: needle overshoots target then bounces back.
   Each needle has: current angle, velocity, target angle.
   Parameters tuned to feel like a real VDO/Smiths gauge needle.
*/
class InertialNeedle {
  constructor(elId) {
    this._el       = document.getElementById(elId);
    this._angle    = -90;   // current rendered angle
    this._velocity = 0;     // deg/frame
    this._target   = -90;   // where needle wants to go
    this._spring   = 0.18;  // stiffness  — higher = snappier
    this._damping  = 0.72;  // damping    — lower = more bounce
    this._drift    = 0;     // idle micro-vibration offset
    this._driftT   = 0;     // drift time accumulator
    this._lastRaf  = null;
    this._lastTime = performance.now();
    this._running  = false;
  }

  setTarget(angle) { this._target = angle; }

  start() {
    if (this._running) return;
    this._running = true;
    this._tick();
  }

  stop() { this._running = false; }

  _tick() {
    if (!this._running) return;

    const now = performance.now();
    const dt  = Math.min((now - this._lastTime) / 16.67, 3); // normalize to 60fps frames
    this._lastTime = now;

    // ── Spring-damper physics
    const error      = this._target - this._angle;
    const force      = error * this._spring;
    this._velocity   = (this._velocity + force) * this._damping;
    this._angle     += this._velocity * dt;

    // ── Idle drift — random micro-vibration simulating engine harmonics
    // Only active when needle is near settled (velocity low)
    if (Math.abs(this._velocity) < 0.5) {
      this._driftT += dt * 0.04;
      // Layered sine waves at different frequencies = organic feel
      this._drift = Math.sin(this._driftT * 2.3) * 0.4
                  + Math.sin(this._driftT * 5.1) * 0.2
                  + Math.sin(this._driftT * 11.7) * 0.1;
    } else {
      this._drift *= 0.85; // fade drift when moving
    }

    const rendered = this._angle + this._drift;
    // Use SVG transform attribute — works correctly on all browsers
    // Pivot point matches SVG needle geometry: (70, 88)
    this._el.setAttribute('transform', `rotate(${rendered} 70 88)`);

    requestAnimationFrame(() => this._tick());
  }
}

/* ── Odometer Roll-up ──
   Animates numeric digits rolling up like a mechanical counter.
   Each digit column slides vertically to the new value.
*/
class Odometer {
  constructor(el, digits = 5) {
    this._el     = el;
    this._digits = digits;
    this._value  = null;
    this._render('0.000');
  }

  setValue(str) {
    if (str === this._value) return;
    this._value = str;
    this._render(str);
  }

  _render(str) {
    this._el.innerHTML = '';
    for (const ch of str) {
      const wrap = document.createElement('div');
      wrap.className = 'odometer-wrap';

      if (ch === '.' || ch === 's') {
        // Static character — no animation
        const sep = document.createElement('span');
        sep.textContent = ch;
        sep.style.cssText = 'display:inline-block;';
        this._el.appendChild(sep);
        continue;
      }

      const digit = parseInt(ch);
      const col   = document.createElement('div');
      col.className = 'odometer-digit';

      // Stack 0–9 vertically, position to show target digit
      for (let i = 0; i <= 9; i++) {
        const s = document.createElement('span');
        s.textContent = i;
        col.appendChild(s);
      }

      // Animate to target digit
      col.style.transform = `translateY(-${digit * 1.1}em)`;
      wrap.appendChild(col);
      this._el.appendChild(wrap);
    }
  }
}

/* ── App ── */
class App {
  constructor() {
    this._filtMag = 1; this._jumps = []; this._sampleCount = 0;
    this._lastHz = 0; this._lastHzTime = performance.now();
    this._airtimeRaf = null;

    this._wave = new Wave(document.getElementById('analogWave'));
    this._fsm  = new FSM(
      { ff:0.25, land:2.0, minMs:250 },
      e => this._onJump(e),
      s => this._onState(s)
    );
    this._session = null; this._sim = null;

    // ── Inertial needle for G-force gauge
    this._gNeedle = new InertialNeedle('gNeedle');
    this._gNeedle.start();

    // ── Attitude Indicator — lazy init on first update
    this._adi = new AttitudeIndicator('adiCanvas');

    // ── Odometer for nixie airtime display
    this._odometer = new Odometer(document.getElementById('nixieTime'));

    document.getElementById('btnEnable').addEventListener('click', () => this._startReal());
    document.getElementById('btnSim').addEventListener('click',    () => this._startSim());
    document.getElementById('btnStop').addEventListener('click',   () => this._stop());
    document.getElementById('btnClear').addEventListener('click',  () => this._clear());

    this._lastUi = 0;
  }

  _frame(f) {
    const rawMag = SP.toG(SP.mag(f.ax, f.ay, f.az));
    this._filtMag = SP.lpf(rawMag, this._filtMag, 0.15);
    const gyroMag = SP.mag(f.gx, f.gy, f.gz);

    this._sampleCount++;
    const now = performance.now();
    if (now - this._lastHzTime > 1000) {
      this._lastHz = this._sampleCount; this._sampleCount = 0; this._lastHzTime = now;
    }

    this._fsm.update(this._filtMag, gyroMag, f.timestamp);
    this._wave.push(this._filtMag);

    if (now - this._lastUi > 40) {
      this._lastUi = now;
      // G-force needle
      this._gNeedle.setTarget(gToAngle(this._filtMag));
      document.getElementById('gText').textContent = this._filtMag.toFixed(2)+'G';
      // Attitude indicator — feed raw gyro axes directly
      this._adi.update(f.gx, f.gy);
      document.getElementById('adiRoll').textContent  = Math.round(this._adi._roll)+'°';
      document.getElementById('adiPitch').textContent = Math.round(this._adi._pitch)+'°';
      document.getElementById('stripHz').textContent = this._lastHz + ' Hz';

      if (this._fsm.state === FSM.S.AIR && this._fsm._t0) {
        const el = (performance.now() - this._fsm._t0) / 1000;
        this._odometer.setValue(el.toFixed(3) + 's');
      }
    }
  }

  _onState(s) {
    document.getElementById('seg0').className = 'state-seg' + (s===FSM.S.GROUND ? ' active-ground':'');
    document.getElementById('seg1').className = 'state-seg' + (s===FSM.S.AIR    ? ' active-air'   :'');
    document.getElementById('seg2').className = 'state-seg' + (s===FSM.S.LAND   ? ' active-land'  :'');
  }

  _onJump(e) {
    this._jumps.unshift(e);
    this._odometer.setValue((e.airtimeMs/1000).toFixed(3) + 's');
    document.getElementById('jumpCountSub').textContent = `SESSION — ${e.id} JUMP${e.id!==1?'S':''}`;
    document.getElementById('logCount').textContent = e.id + ' JUMP' + (e.id!==1?'S':'');
    this._renderLog();
  }

  _renderLog() {
    const container = document.getElementById('logEntries');
    document.getElementById('emptyLog').style.display = 'none';
    container.innerHTML = '';
    const bestMs = Math.max(...this._jumps.map(j=>j.airtimeMs));

    this._jumps.forEach((e, i) => {
      const prev = this._jumps[i+1] || null;
      const d = (curr, pv, hiGood=true) => {
        if (!prev) return '<span class="delta-same">—</span>';
        const diff = curr - pv;
        if (Math.abs(diff) < 0.001) return '<span class="delta-same">=</span>';
        const good = hiGood ? diff>0 : diff<0;
        const cls  = good ? 'delta-up' : 'delta-down';
        const pct  = Math.abs((diff/pv*100)).toFixed(0);
        return `<span class="${cls}">${diff>0?'▲':'▼'}${pct}%</span>`;
      };

      const el = document.createElement('div');
      el.className = 'log-entry new-entry' + (e.airtimeMs===bestMs&&this._jumps.length>1?' is-best':'');
      el.innerHTML = `
        <div class="le-num">#${e.id}</div>
        <div class="le-stat">
          <div class="le-val" style="color:var(--ice)"}>${(e.airtimeMs/1000).toFixed(3)}s</div>
          <div class="le-lbl">airtime</div>
          <div class="le-delta">${d(e.airtimeMs, prev?.airtimeMs, true)}</div>
        </div>
        <div class="le-stat">
          <div class="le-val" style="color:var(--red)">${e.impactG.toFixed(1)}G</div>
          <div class="le-lbl">impact</div>
          <div class="le-delta">${d(e.impactG, prev?.impactG, false)}</div>
        </div>
        <div class="le-stat">
          <div class="le-val" style="color:var(--white-dim)">${e.peakW}°/s</div>
          <div class="le-lbl">rotation</div>
          <div class="le-delta">${d(e.peakW, prev?.peakW, true)}</div>
        </div>
        <div class="le-badge">${e.airtimeMs===bestMs&&this._jumps.length>1?'★ BEST':''}</div>
      `;
      container.appendChild(el);
    });
  }

  async _startReal() {
    try {
      if (typeof DeviceMotionEvent.requestPermission === 'function') {
        if (await DeviceMotionEvent.requestPermission() !== 'granted') throw new Error('denied');
      }
      this._motionCb = evt => {
        const a = evt.accelerationIncludingGravity||evt.acceleration, r=evt.rotationRate;
        if(!a||a.x===null) return;
        this._frame({ax:a.x??0,ay:a.y??0,az:a.z??0,gx:r?.alpha??0,gy:r?.beta??0,gz:r?.gamma??0,timestamp:performance.now()});
      };
      window.addEventListener('devicemotion', this._motionCb, {passive:true});
      this._setActive(true);
    } catch(e) { alert('Sensor error: '+e.message); }
  }

  _startSim() {
    this._sim = new Sim(f => this._frame(f));
    this._sim.start();
    this._setActive(true);
  }

  _stop() {
    if (this._motionCb) { window.removeEventListener('devicemotion',this._motionCb); this._motionCb=null; }
    if (this._sim) { this._sim.stop(); this._sim=null; }
    this._setActive(false);
  }

  _clear() {
    this._jumps = []; this._fsm._count = 0;
    document.getElementById('logEntries').innerHTML = '';
    document.getElementById('emptyLog').style.display = '';
    this._odometer.setValue('0.000s');
    document.getElementById('jumpCountSub').textContent = 'SESSION — 0 JUMPS';
    document.getElementById('logCount').textContent = '0 JUMPS';
  }

  _setActive(on) {
    document.getElementById('btnStop').disabled    = !on;
    document.getElementById('btnEnable').disabled  =  on;
    document.getElementById('btnSim').disabled     =  on;
  }
}

window.addEventListener('DOMContentLoaded', () => {
  try {
    window._app = new App();
    // Force ADI to render immediately
    window._app._adi._init();
  } catch(e) {
    console.error('App init error:', e);
  }
});
</script>
</body>
</html>
