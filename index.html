<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MOTO AIR — Golden Hour</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Michroma&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');

:root {
  --bg:        #0a0900;
  --bg2:       #141008;
  --bg3:       #1c160a;
  --border:    #2e2408;
  --border2:   #504010;
  --chrome:    #c8960a;
  --chrome-dim:#7a5808;
  --chrome-hi: #f0c840;
  --white:     #f0e0a0;
  --white-dim: #907830;
  --red:       #e84820;
  --ice:       #f0a800;
  --ice-dim:   #805800;
  --green:     #a8c820;
  --needle:    #f0a800;
  --glass:     rgba(240,168,0,0.04);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Golden hour grain texture */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(240,180,20,0.022) 3px, rgba(240,180,20,0.022) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(240,180,20,0.012) 80px, rgba(240,180,20,0.012) 81px);
  pointer-events: none; z-index: 0;
}

/* Golden hour vignette */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(6,4,0,0.82) 100%);
  pointer-events: none; z-index: 0;
}

.shell {
  position: relative; z-index: 1;
  max-width: 420px;
  margin: 0 auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── HEADER PLATE ── */
.header-plate {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
  box-shadow:
    inset 0 1px 0 rgba(240,180,20,0.10),
    inset 0 -1px 0 rgba(0,0,0,0.5),
    0 2px 8px rgba(0,0,0,0.6);
}

/* Brushed titanium lines */
.header-plate::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    92deg,
    transparent,
    transparent 2px,
    rgba(240,180,20,0.03) 2px,
    rgba(240,180,20,0.03) 3px
  );
}

.logo {
  font-family: 'Michroma', sans-serif;
  font-size: 20px;
  letter-spacing: 0.2em;
  color: var(--chrome-hi);
  text-shadow: 0 0 20px rgba(240,168,0,0.38);
}
.logo span { color: var(--ice); }

.header-rivets {
  display: flex; gap: 6px; align-items: center;
}
.rivet {
  width: 8px; height: 8px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--chrome-hi), var(--chrome-dim));
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.6), 0 1px 0 rgba(240,180,20,0.14);
}

/* ── STATE BAR ── */
/* ── STATUS BAR ── */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 8px 14px;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
}
.sensor-badges {
  display: flex;
  gap: 8px;
  align-items: center;
}
.sensor-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--border2);
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: 2px;
  transition: all 0.3s;
}
.sensor-badge.active {
  color: var(--green);
  border-color: var(--green);
  background: rgba(168,200,32,0.06);
}
.sensor-badge.error {
  color: var(--red);
  border-color: var(--red);
}
.sensor-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
}
.sensor-dot.pulse { animation: dot-pulse 1s ease-in-out infinite; }
@keyframes dot-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.3; transform: scale(0.6); }
}
.best-airtime-display {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 1px;
}
.best-airtime-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  color: var(--chrome-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.best-airtime-value {
  font-family: 'Share Tech Mono', monospace;
  font-size: 16px;
  color: var(--chrome-hi);
  line-height: 1;
  text-shadow: 0 0 10px rgba(240,168,0,0.4);
}
.best-airtime-value.empty { color: var(--border2); font-size: 11px; }


/* ── GAUGE ROW ── */
.gauge-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.gauge-housing {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
  box-shadow:
    inset 0 2px 4px rgba(0,0,0,0.5),
    inset 0 -1px 0 rgba(240,180,20,0.05),
    0 1px 3px rgba(0,0,0,0.4);
}

/* Corner screws */
.gauge-housing::before,
.gauge-housing::after {
  content: '';
  position: absolute;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--chrome-hi), var(--chrome-dim));
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.6);
}
.gauge-housing::before { top: 5px; left: 5px; }
.gauge-housing::after  { top: 5px; right: 5px; }

.gauge-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--chrome-dim);
  text-align: center;
}

/* SVG GAUGE */
.gauge-svg-wrap {
  position: relative;
  width: 160px; height: 100px;
  overflow: visible;
}

/* ── BIG AIRTIME DISPLAY ── */
.airtime-housing {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 16px 20px;
  position: relative;
  overflow: hidden;
  box-shadow:
    inset 0 2px 6px rgba(0,0,0,0.5),
    inset 0 -1px 0 rgba(240,180,20,0.05);
}

/* All four corner screws */
.airtime-housing .screw {
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--chrome-hi), var(--chrome-dim));
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.6);
}
.screw.tl { top:6px; left:6px; }
.screw.tr { top:6px; right:6px; }
.screw.bl { bottom:6px; left:6px; }
.screw.br { bottom:6px; right:6px; }

.airtime-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--chrome-dim);
  margin-bottom: 8px;
}

/* Nixie-tube-style digits */
.nixie {
  font-family: 'Share Tech Mono', monospace;
  font-size: 52px;
  line-height: 1;
  color: var(--ice);
  text-shadow:
    0 0 8px rgba(240,168,0,0.85),
    0 0 20px rgba(240,168,0,0.45),
    0 0 40px rgba(240,168,0,0.22);
  letter-spacing: 0.05em;
}
.nixie .unit {
  font-size: 18px;
  opacity: 0.6;
  vertical-align: bottom;
  margin-left: 2px;
}

.airtime-sub {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  color: var(--white-dim);
  margin-top: 4px;
  letter-spacing: 0.05em;
}

/* ── WAVEFORM / STRIP CHART ── */
.strip-housing {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.5);
}
.strip-header {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg3);
}
.strip-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--chrome-dim);
}
.strip-hz {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--border2);
}
canvas#analogWave {
  display: block;
  width: 100%;
  height: 90px;
  background: #080600;
}

/* ── JUMP LOG ── */
.log-housing {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  overflow: hidden;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
}
.log-header {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg3);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.log-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--chrome-dim);
}
.log-scroll {
  max-height: 240px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.log-entry {
  display: grid;
  grid-template-columns: 32px 1fr 1fr 1fr 1fr;
  padding: 10px 14px;
  border-bottom: 1px solid rgba(58,52,32,0.5);
  gap: 4px;
  align-items: center;
  transition: background 0.1s;
}
.log-entry:hover { background: var(--bg3); }
.log-entry.new-entry { animation: log-in 0.4s ease-out; }
@keyframes log-in {
  from { background: rgba(240,168,0,0.07); transform: translateX(-6px); opacity: 0; }
  to { background: transparent; transform: none; opacity: 1; }
}

.le-num {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--border2);
}
.le-stat { display: flex; flex-direction: column; gap: 1px; }
.le-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  color: var(--white);
}
.le-lbl {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  text-transform: uppercase;
  color: var(--border2);
  letter-spacing: 0.08em;
}
.le-delta {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
}
.delta-up   { color: var(--green); }
.delta-down { color: var(--red); }
.delta-same { color: var(--border2); }

.le-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--ice);
  text-align: right;
}
.is-best .le-num::before {
  content: '★';
  display: block;
  color: var(--chrome);
  font-size: 10px;
}

/* ── CONTROLS ── */
.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border-radius: 3px;
  cursor: pointer;
  padding: 11px 16px;
  transition: all 0.12s;
  position: relative;
  overflow: hidden;
  box-shadow:
    inset 0 1px 0 rgba(240,180,20,0.10),
    inset 0 -2px 0 rgba(0,0,0,0.4),
    0 2px 6px rgba(0,0,0,0.5);
}
.btn-start {
  background: linear-gradient(180deg, #0e1e2e 0%, #080e18 100%);
  border: 1px solid #604000;
  color: var(--green);
  text-shadow: 0 0 8px rgba(168,200,32,0.45);
}
.btn-start:hover {
  background: linear-gradient(180deg, #122840 0%, #0a1e30 100%);
  box-shadow: inset 0 1px 0 rgba(240,180,20,0.14), 0 0 12px rgba(240,168,0,0.22);
}
.btn-sim {
  background: linear-gradient(180deg, #0e1a24 0%, #080e16 100%);
  border: 1px solid var(--border2);
  color: var(--ice);
  text-shadow: 0 0 8px rgba(240,168,0,0.32);
}
.btn-sim:hover {
  background: linear-gradient(180deg, #102030 0%, #081018 100%);
}
.btn-stop {
  background: linear-gradient(180deg, #1a0810 0%, #0e0610 100%);
  border: 1px solid #602030;
  color: var(--red);
  opacity: 0.5;
}
.btn-stop:not([disabled]) { opacity: 1; }
.btn-clear {
  background: linear-gradient(180deg, #121820 0%, #0a0e14 100%);
  border: 1px solid var(--border);
  color: var(--white-dim);
}

.empty-log {
  padding: 32px;
  text-align: center;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--border2);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
</style>
</head>
<body>

<div class="shell">

  <!-- HEADER -->
  <div class="header-plate">
    <div class="logo">MOTO <span>AIR</span></div>
    <div class="header-rivets">
      <div class="rivet"></div>
      <div class="rivet"></div>
      <div class="rivet"></div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="sensor-badges">
      <div class="sensor-badge" id="accelBadge">
        <div class="sensor-dot" id="accelDot"></div>
        <span>ACCEL</span>
      </div>
      <div class="sensor-badge" id="gyroBadge">
        <div class="sensor-dot" id="gyroDot"></div>
        <span>GYRO</span>
      </div>
      <div class="sensor-badge" id="sessionBadge">
        <div class="sensor-dot" id="sessionDot"></div>
        <span id="sessionLabel">IDLE</span>
      </div>
      <div class="sensor-badge" id="gpsBadge">
        <div class="sensor-dot" id="gpsDot"></div>
        <span id="gpsLabel">GPS</span>
      </div>
    </div>
    <div class="best-airtime-display">
      <div class="best-airtime-label">🏆 Best</div>
      <div class="best-airtime-value empty" id="bestAirtimeVal">—</div>
    </div>
  </div>

  <!-- GAUGE ROW -->
  <div class="gauge-row">

    <!-- G-FORCE GAUGE -->
    <div class="gauge-housing">
      <div class="gauge-label">G-Force</div>
      <div class="gauge-svg-wrap">
        <svg viewBox="0 0 160 100" width="160" height="100">
          <defs>
            <radialGradient id="dialGrad" cx="50%" cy="100%" r="80%">
              <stop offset="0%" stop-color="#1c1600"/>
              <stop offset="100%" stop-color="#060400"/>
            </radialGradient>
            <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="2" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <!-- Dial background -->
          <path d="M 10 90 A 70 70 0 0 1 150 90" fill="url(#dialGrad)" stroke="#3a2e08" stroke-width="1.5"/>
          <!-- Outer bezel -->
          <path d="M 6 90 A 74 74 0 0 1 154 90" fill="none" stroke="#5a4010" stroke-width="2"/>
          <!-- Arc zones: green 0-1.5G, amber 1.5-3G, red 3-5G -->
          <path d="M 12 90 A 66 66 0 0 1 46 34" fill="none" stroke="#a8c820" stroke-width="5" stroke-linecap="butt" opacity="0.8"/>
          <path d="M 46 34 A 66 66 0 0 1 114 34" fill="none" stroke="#f0a800" stroke-width="5" stroke-linecap="butt" opacity="0.8"/>
          <path d="M 114 34 A 66 66 0 0 1 148 90" fill="none" stroke="#e84820" stroke-width="5" stroke-linecap="butt" opacity="0.8"/>
          <!-- Major ticks -->
          <g stroke="#c8a820" stroke-width="1.5">
            <line x1="80" y1="22" x2="80" y2="34" transform="rotate(-90 80 90)"/>
            <line x1="80" y1="22" x2="80" y2="34" transform="rotate(-54 80 90)"/>
            <line x1="80" y1="22" x2="80" y2="34" transform="rotate(-18 80 90)"/>
            <line x1="80" y1="22" x2="80" y2="34" transform="rotate(18 80 90)"/>
            <line x1="80" y1="22" x2="80" y2="34" transform="rotate(54 80 90)"/>
            <line x1="80" y1="22" x2="80" y2="34" transform="rotate(90 80 90)"/>
          </g>
          <!-- Minor ticks -->
          <g stroke="#7a5808" stroke-width="1">
            <line x1="80" y1="25" x2="80" y2="34" transform="rotate(-72 80 90)"/>
            <line x1="80" y1="25" x2="80" y2="34" transform="rotate(-36 80 90)"/>
            <line x1="80" y1="25" x2="80" y2="34" transform="rotate(0 80 90)"/>
            <line x1="80" y1="25" x2="80" y2="34" transform="rotate(36 80 90)"/>
            <line x1="80" y1="25" x2="80" y2="34" transform="rotate(72 80 90)"/>
          </g>
          <!-- Labels -->
          <text x="10" y="88" font-family="Share Tech Mono" font-size="8" fill="#c8a820" text-anchor="middle">0</text>
          <text x="33" y="50" font-family="Share Tech Mono" font-size="8" fill="#c8a820" text-anchor="middle">1</text>
          <text x="80" y="20" font-family="Share Tech Mono" font-size="8" fill="#c8a820" text-anchor="middle">2</text>
          <text x="127" y="50" font-family="Share Tech Mono" font-size="8" fill="#c8a820" text-anchor="middle">3</text>
          <text x="150" y="88" font-family="Share Tech Mono" font-size="8" fill="#c8a820" text-anchor="middle">5</text>
          <!-- Needle: at rest points LEFT (0G = -90deg from top) -->
          <g id="gNeedle" transform="rotate(-90 80 90)">
            <polygon points="80,90 79,84 80,26 81,84" fill="#f0a800" filter="url(#glow)"/>
            <polygon points="80,90 78,97 80,100 82,97" fill="#6a4808"/>
            <circle cx="80" cy="90" r="6" fill="#1c1600" stroke="#c8a820" stroke-width="1.5"/>
            <circle cx="80" cy="90" r="2.5" fill="#f0c840"/>
          </g>
          <!-- Readout -->
          <rect x="56" y="72" width="48" height="14" rx="2" fill="#080600" stroke="#3a2e08"/>
          <text id="gText" x="80" y="83" text-anchor="middle" font-family="Share Tech Mono" font-size="9" fill="#f0c840">1.00G</text>
        </svg>
      </div>
    </div>

    <!-- DISTANCE GAUGE — est. jump distance in feet -->
    <div class="gauge-housing">
      <div class="gauge-label">Est. Distance</div>
      <div class="gauge-svg-wrap">
        <svg viewBox="0 0 160 100" width="160" height="100">
          <defs>
            <filter id="glow2" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="2" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <path d="M 10 90 A 70 70 0 0 1 150 90" fill="url(#dialGrad)" stroke="#3a2e08" stroke-width="1.5"/>
          <path d="M 6 90 A 74 74 0 0 1 154 90" fill="none" stroke="#5a4010" stroke-width="2"/>
          <!-- Arc zones: 0-30ft green, 30-70ft amber, 70-100ft+ red -->
          <path d="M 12 90 A 66 66 0 0 1 55 30" fill="none" stroke="#a8c820" stroke-width="5" stroke-linecap="butt" opacity="0.8"/>
          <path d="M 55 30 A 66 66 0 0 1 105 30" fill="none" stroke="#f0a800" stroke-width="5" stroke-linecap="butt" opacity="0.8"/>
          <path d="M 105 30 A 66 66 0 0 1 148 90" fill="none" stroke="#e84820" stroke-width="5" stroke-linecap="butt" opacity="0.8"/>
          <!-- Major ticks at 0,20,40,60,80,100ft -->
          <g stroke="#c8a820" stroke-width="1.5">
            <line x1="80" y1="22" x2="80" y2="34" transform="rotate(-90 80 90)"/>
            <line x1="80" y1="22" x2="80" y2="34" transform="rotate(-54 80 90)"/>
            <line x1="80" y1="22" x2="80" y2="34" transform="rotate(-18 80 90)"/>
            <line x1="80" y1="22" x2="80" y2="34" transform="rotate(18 80 90)"/>
            <line x1="80" y1="22" x2="80" y2="34" transform="rotate(54 80 90)"/>
            <line x1="80" y1="22" x2="80" y2="34" transform="rotate(90 80 90)"/>
          </g>
          <!-- Minor ticks -->
          <g stroke="#7a5808" stroke-width="1">
            <line x1="80" y1="26" x2="80" y2="34" transform="rotate(-72 80 90)"/>
            <line x1="80" y1="26" x2="80" y2="34" transform="rotate(-36 80 90)"/>
            <line x1="80" y1="26" x2="80" y2="34" transform="rotate(0 80 90)"/>
            <line x1="80" y1="26" x2="80" y2="34" transform="rotate(36 80 90)"/>
            <line x1="80" y1="26" x2="80" y2="34" transform="rotate(72 80 90)"/>
          </g>
          <!-- Labels in feet -->
          <text x="10"  y="88" font-family="Share Tech Mono" font-size="8" fill="#c8a820" text-anchor="middle">0</text>
          <text x="30"  y="48" font-family="Share Tech Mono" font-size="7" fill="#c8a820" text-anchor="middle">20</text>
          <text x="80"  y="18" font-family="Share Tech Mono" font-size="7" fill="#c8a820" text-anchor="middle">50</text>
          <text x="130" y="48" font-family="Share Tech Mono" font-size="7" fill="#c8a820" text-anchor="middle">80</text>
          <text x="150" y="88" font-family="Share Tech Mono" font-size="8" fill="#c8a820" text-anchor="middle">100</text>
          <!-- Needle: rests at -90 (0ft) -->
          <g id="dNeedle" transform="rotate(-90 80 90)">
            <polygon points="80,90 79,84 80,26 81,84" fill="#a8c820" filter="url(#glow2)"/>
            <polygon points="80,90 78,97 80,100 82,97" fill="#506010"/>
            <circle cx="80" cy="90" r="6" fill="#1c1600" stroke="#c8a820" stroke-width="1.5"/>
            <circle cx="80" cy="90" r="2.5" fill="#c8e820"/>
          </g>
          <rect x="50" y="72" width="60" height="14" rx="2" fill="#080600" stroke="#3a2e08"/>
          <text id="dText" x="80" y="83" text-anchor="middle" font-family="Share Tech Mono" font-size="9" fill="#f0c840">-- ft</text>
        </svg>
      </div>
    </div>
  </div>

  <!-- AIRTIME — NIXIE DISPLAY -->
  <div class="airtime-housing">
    <div class="screw tl"></div><div class="screw tr"></div>
    <div class="screw bl"></div><div class="screw br"></div>
    <div class="airtime-label">Airtime</div>
    <div class="nixie" id="nixieTime">0.000<span class="unit">s</span></div>
    <div class="airtime-sub" id="jumpCountSub">SESSION — 0 JUMPS</div>
  </div>

  <!-- STRIP CHART -->
  <div class="strip-housing">
    <div class="strip-header">
      <div class="strip-title">Accel. Magnitude — Filtered</div>
      <div class="strip-hz" id="stripHz">0 Hz</div>
    </div>
    <canvas id="analogWave"></canvas>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="btn btn-start" id="btnEnable">Enable Sensors</button>
    <button class="btn btn-sim"   id="btnSim">▶ Simulate</button>
    <button class="btn btn-stop"  id="btnStop" disabled>■ Stop</button>
    <button class="btn btn-clear" id="btnClear">Clear Log</button>
  </div>

  <!-- JUMP LOG -->
  <div class="log-housing">
    <div class="log-header">
      <div class="log-title">Jump Record</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--border2)" id="logCount">0 JUMPS</div>
    </div>
    <div class="log-scroll">
      <div class="empty-log" id="emptyLog">Awaiting first jump</div>
      <div id="logEntries"></div>
    </div>
  </div>

</div><!-- /shell -->

<script>
'use strict';

/* ── Signal Processor (same math as production) ── */
const SP = {
  mag: (x,y,z) => Math.sqrt(x*x+y*y+z*z),
  lpf: (s, last, a) => a*s + (1-a)*last,
  toG: v => v / 9.81,
};

/* ── State Machine ── */
class FSM {
  static S = { GROUND:'GROUND', AIR:'AIR', LAND:'LAND' };
  constructor(cfg, onJump, onState) {
    this.cfg = cfg;
    this.onJump = onJump; this.onState = onState;
    this._s = FSM.S.GROUND;
    this._t0 = null; this._peakG = 0; this._peakW = 0;
    this._fsSamples = 0; this._filtGyro = 0; this._count = 0;
  }
  update(mag, gyro, ts) {
    this._filtGyro = SP.lpf(gyro, this._filtGyro, 0.2);
    switch(this._s) {
      case FSM.S.GROUND:
        if (mag < this.cfg.ff && this._filtGyro < 200) {
          if (++this._fsSamples >= 3) { this._to(FSM.S.AIR, ts); this._t0=ts; this._peakG=0; this._peakW=0; }
        } else this._fsSamples=0;
        break;
      case FSM.S.AIR:
        if (gyro > this._peakW) this._peakW = gyro;
        if (mag > this._peakG) this._peakG = mag;
        if (mag > this.cfg.land) { this._to(FSM.S.LAND, ts); this._doLand(mag, ts); }
        break;
      case FSM.S.LAND:
        if (mag < 1.5) this._to(FSM.S.GROUND, ts);
        break;
    }
    return this._s;
  }
  _doLand(impG, ts) {
    const ms = ts - this._t0;
    if (ms < this.cfg.minMs) return;
    this._count++;
    this.onJump(Object.freeze({ id:this._count, timestamp:new Date(), airtimeMs:Math.round(ms), impactG:parseFloat(impG.toFixed(2)), peakW:Math.round(this._peakW) }));
  }
  _to(s, ts) { const p=this._s; this._s=s; if(p!==s) this.onState(s,p); }
  get state() { return this._s; }
}

/* ── Waveform Renderer ── */
class Wave {
  constructor(el) {
    this._c = el; this._ctx = el.getContext('2d');
    this._buf = new Float32Array(300); this._h = 0;
    this._ff = 0.25; this._land = 2.0; this._dirty = false;
    new ResizeObserver(()=>this._resize()).observe(el.parentElement);
    this._resize(); requestAnimationFrame(()=>this._loop());
  }
  push(v) { this._buf[this._h++ % this._buf.length]=v; this._dirty=true; }
  _resize() {
    const dpr=window.devicePixelRatio||1, p=this._c.parentElement;
    this._c.width=p.clientWidth*dpr; this._c.height=90*dpr;
    this._c.style.width=p.clientWidth+'px'; this._c.style.height='90px';
    this._dirty=true;
  }
  _loop() { if(this._dirty){this._draw();this._dirty=false;} requestAnimationFrame(()=>this._loop()); }
  _draw() {
    const ctx=this._ctx, W=this._c.width, H=this._c.height, dpr=window.devicePixelRatio||1;
    const PAD=6*dpr, DH=H-PAD*2;
    ctx.clearRect(0,0,W,H);
    // Dark warm background with subtle grid
    ctx.fillStyle='#0c0b06'; ctx.fillRect(0,0,W,H);
    // Horizontal graph lines (ice, very dim)
    ctx.strokeStyle='rgba(46,61,80,0.4)'; ctx.lineWidth=1;
    for(let i=1;i<4;i++){const y=PAD+DH/4*i;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    const N=this._buf.length, len=Math.min(this._h,N), yMax=Math.max(4,this._land*1.4);
    const ys=DH/yMax;
    // Threshold lines — etched look
    const ffy=PAD+DH-this._ff*ys, ldy=PAD+DH-this._land*ys;
    ctx.strokeStyle='rgba(96,200,64,0.35)'; ctx.setLineDash([3*dpr,5*dpr]); ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,ffy);ctx.lineTo(W,ffy);ctx.stroke();
    ctx.strokeStyle='rgba(232,64,48,0.4)'; ctx.setLineDash([3*dpr,3*dpr]);
    ctx.beginPath();ctx.moveTo(0,ldy);ctx.lineTo(W,ldy);ctx.stroke();
    ctx.setLineDash([]);
    if(len<2) return;
    // Cold titanium trace — precision instrument
    ctx.shadowColor='rgba(240,168,0,0.55)'; ctx.shadowBlur=4*dpr;
    ctx.strokeStyle='#e09000'; ctx.lineWidth=1.2*dpr; ctx.lineJoin='round';
    ctx.beginPath();
    for(let i=0;i<len;i++){
      const bi=(this._h-len+i)%N, v=this._buf[(bi+N)%N];
      const x=(i/(N-1))*W, y=PAD+DH-Math.min(v*ys,DH);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke(); ctx.shadowBlur=0;
    // Labels
    ctx.fillStyle='rgba(168,200,32,0.55)'; ctx.font=`${8*dpr}px Share Tech Mono`;
    ctx.fillText(`${this._ff}G`,4*dpr,ffy-3*dpr);
    ctx.fillStyle='rgba(232,64,48,0.55)';
    ctx.fillText(`${this._land}G`,4*dpr,ldy-3*dpr);
  }
}

/* ── Simulator ── */
class Sim {
  constructor(cb) { this._cb=cb; this._id=null; this._pt=0; this._ph='ride'; this._pht=0; this._nextT=this._rideT(); }
  _rideT(){return 2000+Math.random()*2500;} _airT(){return 400+Math.random()*700;}
  start(){let last=performance.now();const t=()=>{const now=performance.now();this._pt+=now-last;this._pht+=now-last;last=now;this._cb(this._frame(now));this._id=requestAnimationFrame(t);};this._id=requestAnimationFrame(t);}
  stop(){if(this._id)cancelAnimationFrame(this._id);this._id=null;this._ph='ride';this._pht=0;this._nextT=this._rideT();}
  _frame(now){
    const n=()=>(Math.random()-.5)*2.5*9.81, t=()=>(Math.random()-.5)*0.8*9.81;
    let ax,ay,az,gx,gy,gz;
    switch(this._ph){
      case 'ride': ax=9.81+n()*.4+t();ay=n()*.3;az=n()*.3;gx=(Math.random()-.5)*60;gy=(Math.random()-.5)*40;gz=(Math.random()-.5)*40;if(this._pht>this._nextT)this._next('takeoff');break;
      case 'takeoff':{const r=this._pht/200;ax=Math.max(.05,1-r*4.5)*9.81+n()*.1;ay=n()*.05;az=n()*.05;gx=(Math.random()-.5)*80;gy=(Math.random()-.5)*60;gz=(Math.random()-.5)*60;if(this._pht>200)this._next('air');break;}
      case 'air':{const ap=this._pht/this._nextT,w=Math.sin(ap*Math.PI)*3;ax=(.05+(Math.random()-.5)*.06)*9.81;ay=(Math.random()-.5)*.04*9.81;az=(Math.random()-.5)*.04*9.81;gx=w*120+(Math.random()-.5)*20;gy=w*80+(Math.random()-.5)*15;gz=w*60+(Math.random()-.5)*15;if(this._pht>this._nextT)this._next('impact');break;}
      case 'impact':{const r=Math.max(0,1-this._pht/80),m=(3.5+Math.random()*2.5)*9.81;ax=m*r;ay=(Math.random()-.5)*m*.3*r;az=(Math.random()-.5)*m*.3*r;gx=(Math.random()-.5)*200*r;gy=(Math.random()-.5)*150*r;gz=(Math.random()-.5)*100*r;if(this._pht>150)this._next('settle');break;}
      case 'settle': ax=9.81*.9+n()*.3;ay=n()*.2;az=n()*.2;gx=(Math.random()-.5)*50;gy=(Math.random()-.5)*40;gz=(Math.random()-.5)*40;if(this._pht>500)this._next('ride');break;
    }
    return{ax,ay,az,gx,gy,gz,timestamp:now,hz:60};
  }
  _next(ph){this._ph=ph;this._pht=0;if(ph==='ride')this._nextT=this._rideT();if(ph==='air')this._nextT=this._airT();}
}

/* ── Needle animation ── */
// SVG native transform — pivot at (80,90) matches needle geometry
// G gauge: -90deg = 0G (points left), +90deg = 5G (points right)
function gToAngle(g) { return Math.min(90, Math.max(-90, (g / 5) * 180 - 90)); }
// Rotation: -90deg = 0°/s, +90deg = 600°/s
function wToAngle(w) { return Math.min(90, Math.max(-90, (w / 600) * 180 - 90)); }
function setNeedle(id, angleDeg) {
  document.getElementById(id).setAttribute('transform', `rotate(${angleDeg} 80 90)`);
}
// G gauge: -90deg = 0G, 0deg = 2.5G, +90deg = 5G
function gToAngle(g) { return Math.min(90, Math.max(-90, (g/5)*180 - 90)); }
// Rotation gauge: -90 = 0, +90 = 600
function wToAngle(w) { return Math.min(90, Math.max(-90, (w/600)*180 - 90)); }

// Distance gauge: -90deg = 0ft, +90deg = 100ft
function dToAngle(ft) { return Math.min(90, Math.max(-90, (ft / 100) * 180 - 90)); }

/* ── GPS Speed Tracker ── */
class GpsTracker {
  constructor(onStatus) {
    this._speed    = null;
    this._watchId  = null;
    this._onStatus = onStatus; // callback('acquiring'|'locked'|'denied'|'unavailable')
  }
  start() {
    if (!navigator.geolocation) { this._onStatus('unavailable'); return; }
    this._onStatus('acquiring');
    this._watchId = navigator.geolocation.watchPosition(
      pos => {
        if (pos.coords.speed !== null && pos.coords.speed >= 0) {
          this._speed = pos.coords.speed * 2.23694;
        } else {
          this._speed = 0;
        }
        this._onStatus('locked');
      },
      err => {
        this._onStatus(err.code === 1 ? 'denied' : 'unavailable');
      },
      { enableHighAccuracy: true, maximumAge: 500, timeout: 10000 }
    );
  }
  stop() {
    if (this._watchId !== null) navigator.geolocation.clearWatch(this._watchId);
    this._watchId = null;
    this._speed   = null;
    this._onStatus('idle');
  }
  snapshot() { return this._speed; }
}

/* ── App ── */
class App {
  constructor() {
    this._filtMag = 1; this._jumps = []; this._sampleCount = 0;
    this._lastHz = 0; this._lastHzTime = performance.now();
    this._airtimeRaf = null;

    this._wave = new Wave(document.getElementById('analogWave'));
    this._fsm  = new FSM(
      { ff:0.25, land:2.0, minMs:250 },
      e => this._onJump(e),
      s => this._onState(s)
    );
    this._session = null; this._sim = null;
    this._gps = new GpsTracker(status => this._updateGpsBadge(status));
    this._takeoffSpeedMph = null;  // GPS speed snapshotted at takeoff
    this._lastDistFt = 0;          // last jump distance for needle hold

    document.getElementById('btnEnable').addEventListener('click', () => this._startReal());
    document.getElementById('btnSim').addEventListener('click',    () => this._startSim());
    document.getElementById('btnStop').addEventListener('click',   () => this._stop());
    document.getElementById('btnClear').addEventListener('click',  () => this._clear());

    this._lastUi = 0;
  }

  _frame(f) {
    const rawMag = SP.toG(SP.mag(f.ax, f.ay, f.az));
    this._filtMag = SP.lpf(rawMag, this._filtMag, 0.15);
    const gyroMag = SP.mag(f.gx, f.gy, f.gz);

    this._sampleCount++;
    const now = performance.now();
    if (now - this._lastHzTime > 1000) {
      this._lastHz = this._sampleCount; this._sampleCount = 0; this._lastHzTime = now;
    }

    this._fsm.update(this._filtMag, gyroMag, f.timestamp);
    this._wave.push(this._filtMag);

    if (now - this._lastUi > 40) {
      this._lastUi = now;
      // Update G needle
      setNeedle('gNeedle', gToAngle(this._filtMag));
      document.getElementById('gText').textContent = this._filtMag.toFixed(2)+'G';

      // Distance needle — live estimate while airborne, holds on landing
      if (this._fsm.state === FSM.S.AIR && this._fsm._t0 && this._takeoffSpeedMph !== null) {
        const elapsedS  = (performance.now() - this._fsm._t0) / 1000;
        const speedFps  = this._takeoffSpeedMph * 1.46667; // mph → ft/s
        // Projectile arc correction: horizontal distance ≈ speed × time × 0.85
        const estFt     = speedFps * elapsedS * 0.85;
        this._lastDistFt = estFt;
        setNeedle('dNeedle', dToAngle(estFt));
        document.getElementById('dText').textContent = Math.round(estFt) + ' ft';
      } else if (this._fsm.state !== FSM.S.AIR && this._lastDistFt > 0) {
        // Hold needle at last jump distance when on ground
        setNeedle('dNeedle', dToAngle(this._lastDistFt));
      } else if (this._takeoffSpeedMph === null) {
        document.getElementById('dText').textContent = 'NO GPS';
      }
      document.getElementById('stripHz').textContent = this._lastHz + ' Hz';

      if (this._fsm.state === FSM.S.AIR && this._fsm._t0) {
        const el = (performance.now() - this._fsm._t0) / 1000;
        document.getElementById('nixieTime').innerHTML = el.toFixed(3) + '<span class="unit">s</span>';
      }
    }
  }

  _onState(s) {
    if (s === FSM.S.AIR)  this._takeoffSpeedMph = this._gps.snapshot();
    if (s === FSM.S.LAND) this._flashImpact();
  }

  _flashImpact() {
    // Brief red screen flash on landing — subtle
    document.body.style.transition = 'background 0.05s';
    document.body.style.background = 'rgba(232,72,32,0.12)';
    setTimeout(() => { document.body.style.background = ''; }, 120);
  }

  _setSessionActive(on) {
    const badges = ['accel','gyro','session'];
    badges.forEach(name => {
      const badge = document.getElementById(name+'Badge');
      const dot   = document.getElementById(name+'Dot');
      if (on) {
        badge.classList.add('active');
        dot.classList.add('pulse');
      } else {
        badge.classList.remove('active');
        dot.classList.remove('pulse');
      }
    });
    document.getElementById('sessionLabel').textContent = on ? 'LIVE' : 'IDLE';
    document.getElementById('btnStop').disabled   = !on;
    document.getElementById('btnEnable').disabled =  on;
    document.getElementById('btnSim').disabled    =  on;
  }

  _updateGpsBadge(status) {
    const badge = document.getElementById('gpsBadge');
    const dot   = document.getElementById('gpsDot');
    const label = document.getElementById('gpsLabel');
    badge.className = 'sensor-badge';
    dot.classList.remove('pulse');
    switch(status) {
      case 'acquiring':
        label.textContent = 'GPS…';
        dot.classList.add('pulse');
        break;
      case 'locked':
        badge.classList.add('active');
        dot.classList.add('pulse');
        label.textContent = 'GPS';
        break;
      case 'denied':
        badge.classList.add('error');
        label.textContent = 'GPS ✗';
        break;
      case 'unavailable':
        label.textContent = 'NO GPS';
        break;
      case 'idle':
      default:
        label.textContent = 'GPS';
        break;
    }
  }
    if (!this._jumps.length) return;
    const best = Math.max(...this._jumps.map(j => j.airtimeMs));
    const el = document.getElementById('bestAirtimeVal');
    el.textContent = (best / 1000).toFixed(3) + 's';
    el.classList.remove('empty');
  }

  _onJump(e) {
    // Calculate final distance using takeoff speed × airtime
    let distFt = null;
    if (this._takeoffSpeedMph !== null) {
      const speedFps = this._takeoffSpeedMph * 1.46667;
      distFt = Math.round(speedFps * (e.airtimeMs / 1000) * 0.85);
      this._lastDistFt = distFt;
      setNeedle('dNeedle', dToAngle(distFt));
      document.getElementById('dText').textContent = distFt + ' ft';
    }
    // Attach distance to event (freeze a new object with it)
    const eventWithDist = Object.freeze({ ...e, distanceFt: distFt });
    this._jumps.unshift(eventWithDist);
    document.getElementById('nixieTime').innerHTML = (e.airtimeMs/1000).toFixed(3)+'<span class="unit">s</span>';
    document.getElementById('jumpCountSub').textContent = `SESSION — ${e.id} JUMP${e.id!==1?'S':''}`;
    document.getElementById('logCount').textContent = e.id + ' JUMP' + (e.id!==1?'S':'');
    this._updateBestAirtime();
    this._renderLog();
  }

  _renderLog() {
    const container = document.getElementById('logEntries');
    document.getElementById('emptyLog').style.display = 'none';
    container.innerHTML = '';
    const bestMs = Math.max(...this._jumps.map(j=>j.airtimeMs));

    this._jumps.forEach((e, i) => {
      const prev = this._jumps[i+1] || null;
      const d = (curr, pv, hiGood=true) => {
        if (!prev) return '<span class="delta-same">—</span>';
        const diff = curr - pv;
        if (Math.abs(diff) < 0.001) return '<span class="delta-same">=</span>';
        const good = hiGood ? diff>0 : diff<0;
        const cls  = good ? 'delta-up' : 'delta-down';
        const pct  = Math.abs((diff/pv*100)).toFixed(0);
        return `<span class="${cls}">${diff>0?'▲':'▼'}${pct}%</span>`;
      };

      const el = document.createElement('div');
      el.className = 'log-entry new-entry' + (e.airtimeMs===bestMs&&this._jumps.length>1?' is-best':'');
      el.innerHTML = `
        <div class="le-num">#${e.id}</div>
        <div class="le-stat">
          <div class="le-val" style="color:var(--ice)"}>${(e.airtimeMs/1000).toFixed(3)}s</div>
          <div class="le-lbl">airtime</div>
          <div class="le-delta">${d(e.airtimeMs, prev?.airtimeMs, true)}</div>
        </div>
        <div class="le-stat">
          <div class="le-val" style="color:var(--green)">${e.distanceFt !== null ? e.distanceFt+'ft' : '--'}</div>
          <div class="le-lbl">distance</div>
          <div class="le-delta">${e.distanceFt !== null ? d(e.distanceFt, prev?.distanceFt, true) : ''}</div>
        </div>
        <div class="le-stat">
          <div class="le-val" style="color:var(--red)">${e.impactG.toFixed(1)}G</div>
          <div class="le-lbl">impact</div>
          <div class="le-delta">${d(e.impactG, prev?.impactG, false)}</div>
        </div>
        <div class="le-badge">${e.airtimeMs===bestMs&&this._jumps.length>1?'★ BEST':''}</div>
      `;
      container.appendChild(el);
    });
  }

  async _startReal() {
    try {
      if (typeof DeviceMotionEvent.requestPermission === 'function') {
        if (await DeviceMotionEvent.requestPermission() !== 'granted') throw new Error('denied');
      }
      this._motionCb = evt => {
        const a = evt.accelerationIncludingGravity||evt.acceleration, r=evt.rotationRate;
        if(!a||a.x===null) return;
        this._frame({ax:a.x??0,ay:a.y??0,az:a.z??0,gx:r?.alpha??0,gy:r?.beta??0,gz:r?.gamma??0,timestamp:performance.now()});
      };
      window.addEventListener('devicemotion', this._motionCb, {passive:true});
      this._gps.start();
      this._setSessionActive(true);
    } catch(e) { alert('Sensor error: '+e.message); }
  }

  _startSim() {
    this._sim = new Sim(f => this._frame(f));
    this._sim.start();
    // Inject a fake GPS speed for simulation (25 mph typical MX approach speed)
    this._takeoffSpeedMph = 25;
    this._setSessionActive(true);
  }

  _stop() {
    if (this._motionCb) { window.removeEventListener('devicemotion',this._motionCb); this._motionCb=null; }
    if (this._sim) { this._sim.stop(); this._sim=null; }
    this._gps.stop();
    this._takeoffSpeedMph = null;
    this._setSessionActive(false);
  }

  _clear() {
    this._jumps = []; this._fsm._count = 0;
    document.getElementById('logEntries').innerHTML = '';
    document.getElementById('emptyLog').style.display = '';
    document.getElementById('nixieTime').innerHTML = '0.000<span class="unit">s</span>';
    document.getElementById('jumpCountSub').textContent = 'SESSION — 0 JUMPS';
    this._lastDistFt = 0;
    setNeedle('dNeedle', dToAngle(0));
    document.getElementById('dText').textContent = '-- ft';
    const best = document.getElementById('bestAirtimeVal');
    best.textContent = '—'; best.classList.add('empty');
  }
}

window.addEventListener('DOMContentLoaded', () => { window._app = new App(); });
</script>
